<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>문장별 해설 뷰어</title>
<style>
  :root {
    --bg: #f8f7f4;
    --card: #ffffff;
    --accent: #2563eb;
    --accent-light: #dbeafe;
    --highlight: #fef08a;
    --highlight-border: #eab308;
    --text: #1e293b;
    --text-sub: #64748b;
    --border: #e2e8f0;
    --vocab-bg: #f1f5f9;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                 "Noto Sans KR", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    position: relative;
    text-align: center;
    padding: 1.5rem 1rem 1rem;
    border-bottom: 1px solid var(--border);
    background: var(--card);
  }
  .home-btn {
    position: absolute;
    left: 1rem;
    top: 50%;
    transform: translateY(-50%);
    display: inline-flex;
    align-items: center;
    gap: 0.3rem;
    padding: 0.4rem 0.8rem;
    background: var(--accent-light);
    color: var(--accent);
    text-decoration: none;
    border-radius: 8px;
    font-size: 0.85rem;
    font-weight: 600;
    transition: background 0.15s, color 0.15s;
  }
  .home-btn:hover {
    background: var(--accent);
    color: #fff;
  }
  header h1 {
    font-size: 1.1rem;
    font-weight: 700;
    word-break: keep-all;
  }
  .progress-row {
    margin-top: .6rem;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: .5rem;
    font-size: .85rem;
    color: var(--text-sub);
  }
  .progress-bar {
    width: 120px; height: 5px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 3px;
    transition: width .3s;
  }

  /* ── Main ── */
  main {
    flex: 1;
    overflow-y: auto;
    padding: 1.25rem 1rem 7rem;
    max-width: 640px;
    width: 100%;
    margin: 0 auto;
  }

  .section-label {
    font-size: .75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .05em;
    color: var(--accent);
    margin-bottom: .5rem;
  }

  /* Original sentence */
  .original-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem;
    font-size: 1.08rem;
    line-height: 1.75;
    margin-bottom: 1.25rem;
    word-break: keep-all;
  }
  .original-card .hw {
    background: var(--highlight);
    border-bottom: 2px solid var(--highlight-border);
    border-radius: 3px;
    padding: 0 1px;
    cursor: pointer;
    transition: background .15s;
  }
  .original-card .hw:hover {
    background: #fde047;
  }

  /* ── Tooltip ── */
  .tooltip-overlay {
    position: fixed;
    inset: 0;
    z-index: 99;
  }
  .vocab-tooltip {
    position: absolute;
    z-index: 100;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: .9rem 1rem;
    box-shadow: 0 4px 20px rgba(0,0,0,.12);
    max-width: 320px;
    width: max-content;
    animation: tooltipIn .15s ease;
  }
  .vocab-tooltip::after {
    content: '';
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    border: 8px solid transparent;
  }
  .vocab-tooltip.above::after {
    top: 100%;
    border-top-color: var(--card);
  }
  .vocab-tooltip.below::after {
    bottom: 100%;
    border-bottom-color: var(--card);
  }
  .vocab-tooltip .tt-word {
    font-weight: 700;
    color: var(--accent);
    font-size: .95rem;
    margin-bottom: .2rem;
  }
  .vocab-tooltip .tt-meaning {
    font-size: .9rem;
    line-height: 1.5;
  }
  .vocab-tooltip .tt-note {
    font-size: .8rem;
    color: var(--text-sub);
    margin-top: .15rem;
    line-height: 1.4;
  }
  .vocab-tooltip .tt-sep {
    border: none;
    border-top: 1px solid var(--border);
    margin: .5rem 0;
  }
  @keyframes tooltipIn {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Explanation */
  .explain-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem;
    font-size: .97rem;
    line-height: 1.8;
    margin-bottom: 1.25rem;
    color: var(--text);
  }

  /* Vocabulary */
  .vocab-list {
    display: flex;
    flex-direction: column;
    gap: .6rem;
  }
  .vocab-item {
    background: var(--vocab-bg);
    border-radius: 10px;
    padding: 1rem 1.1rem;
  }
  .vocab-word {
    font-weight: 700;
    font-size: 1rem;
    color: var(--accent);
  }
  .vocab-meaning {
    margin-top: .25rem;
    font-size: .93rem;
  }
  .vocab-note {
    margin-top: .2rem;
    font-size: .82rem;
    color: var(--text-sub);
  }

  /* ── Bottom Nav ── */
  .bottom-nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--card);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: .75rem 1rem;
    padding-bottom: max(.75rem, env(safe-area-inset-bottom));
    z-index: 10;
  }
  .nav-btn {
    display: flex;
    align-items: center;
    gap: .35rem;
    background: none;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: .6rem 1.1rem;
    font-size: .95rem;
    font-weight: 600;
    color: var(--text);
    cursor: pointer;
    transition: all .15s;
    min-width: 5.5rem;
    justify-content: center;
  }
  .nav-btn:active { transform: scale(.96); }
  .nav-btn:not(:disabled):hover {
    border-color: var(--accent);
    color: var(--accent);
  }
  .nav-btn:disabled { opacity: .3; cursor: default; }
  .nav-indicator {
    font-size: .85rem;
    font-weight: 600;
    color: var(--text-sub);
    min-width: 3rem;
    text-align: center;
  }

  /* Animation */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  main > * { animation: fadeIn .3s ease; }

  /* ── Quiz Modal ── */
  .quiz-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.45);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    animation: fadeIn .2s ease;
  }
  .quiz-box {
    background: var(--card);
    border-radius: 16px;
    padding: 1.5rem;
    max-width: 420px;
    width: 100%;
    box-shadow: 0 8px 32px rgba(0,0,0,.18);
    animation: fadeIn .25s ease;
  }
  .quiz-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1rem;
  }
  .quiz-title {
    font-size: 1rem;
    font-weight: 700;
    color: var(--accent);
  }
  .quiz-progress {
    font-size: .82rem;
    color: var(--text-sub);
    font-weight: 600;
  }
  .quiz-direction {
    display: inline-block;
    font-size: .72rem;
    font-weight: 600;
    padding: .2rem .55rem;
    border-radius: 6px;
    margin-bottom: .6rem;
  }
  .quiz-direction.en2ko {
    background: #dbeafe;
    color: #1d4ed8;
  }
  .quiz-direction.ko2en {
    background: #fef3c7;
    color: #92400e;
  }
  .quiz-prompt {
    font-size: 1.15rem;
    font-weight: 700;
    margin-bottom: 1rem;
    line-height: 1.5;
    word-break: keep-all;
  }
  .quiz-choices {
    display: flex;
    flex-direction: column;
    gap: .5rem;
  }
  .quiz-choice {
    width: 100%;
    text-align: left;
    background: var(--vocab-bg);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: .7rem 1rem;
    font-size: .95rem;
    font-family: inherit;
    color: var(--text);
    cursor: pointer;
    transition: all .15s;
    line-height: 1.4;
    word-break: keep-all;
  }
  .quiz-choice:hover:not(:disabled) {
    border-color: var(--accent);
    background: var(--accent-light);
  }
  .quiz-choice:disabled {
    cursor: default;
  }
  .quiz-choice.chosen-correct {
    background: #dcfce7;
    border-color: #22c55e;
    color: #166534;
    font-weight: 600;
  }
  .quiz-choice.chosen-wrong {
    background: #fef2f2;
    border-color: #ef4444;
    color: #991b1b;
  }
  .quiz-choice.reveal-correct {
    background: #dcfce7;
    border-color: #22c55e;
    color: #166534;
    font-weight: 600;
  }
  .quiz-feedback {
    margin-top: .8rem;
    padding: .75rem 1rem;
    border-radius: 10px;
    font-size: .93rem;
    line-height: 1.5;
    animation: fadeIn .2s ease;
  }
  .quiz-feedback.correct {
    background: #dcfce7;
    color: #166534;
    border: 1px solid #bbf7d0;
  }
  .quiz-feedback.wrong {
    background: #fef2f2;
    color: #991b1b;
    border: 1px solid #fecaca;
  }
  .quiz-feedback .fb-answer {
    font-weight: 700;
  }
  .quiz-next-btn {
    margin-top: .8rem;
    width: 100%;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: .7rem;
    font-size: .95rem;
    font-weight: 600;
    cursor: pointer;
    transition: background .15s;
  }
  .quiz-next-btn:hover {
    background: #1d4ed8;
  }

  /* ── Wrong Words Summary ── */
  .wrong-summary-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.45);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    animation: fadeIn .2s ease;
  }
  .wrong-summary-box {
    background: var(--card);
    border-radius: 16px;
    padding: 1.5rem;
    max-width: 480px;
    width: 100%;
    max-height: 80vh;
    overflow-y: auto;
    box-shadow: 0 8px 32px rgba(0,0,0,.18);
    animation: fadeIn .25s ease;
  }
  .wrong-summary-title {
    font-size: 1.05rem;
    font-weight: 700;
    color: #991b1b;
    margin-bottom: 1rem;
    text-align: center;
  }
  .wrong-summary-perfect {
    font-size: 1.05rem;
    font-weight: 700;
    color: #166534;
    margin-bottom: 1rem;
    text-align: center;
  }
  .wrong-item {
    background: #fef2f2;
    border: 1px solid #fecaca;
    border-radius: 10px;
    padding: .8rem 1rem;
    margin-bottom: .5rem;
  }
  .wrong-item .wi-word {
    font-weight: 700;
    color: #1d4ed8;
    font-size: .95rem;
  }
  .wrong-item .wi-meaning {
    font-size: .9rem;
    color: var(--text);
    margin-top: .15rem;
  }
  .wrong-close-btn {
    margin-top: 1rem;
    width: 100%;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: .7rem;
    font-size: .95rem;
    font-weight: 600;
    cursor: pointer;
  }
</style>
</head>
<body>

<header>
  <a class="home-btn" href="../../">&#8592; 홈</a>
  <h1 id="pageTitle">문장별 해설</h1>
  <div class="progress-row">
    <span id="progressLabel">1 / ?</span>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  </div>
</header>

<main id="content"></main>

<nav class="bottom-nav">
  <button class="nav-btn" id="prevBtn" onclick="go(-1)">&#8249; 이전</button>
  <span class="nav-indicator" id="navIndicator">1 / ?</span>
  <button class="nav-btn" id="nextBtn" onclick="go(1)">다음 &#8250;</button>
</nav>

<script>
// ── DATA (injected by generate_html) ──
const DATA = {"title": "전문가는 왜 초보자의 어려움을 잘 모를까", "summary": "전문가는 익숙해질수록 초보자가 배우기 얼마나 어려운지 쉽게 잊어버리기 때문에, 가르칠 때는 학생의 눈높이에서 배움 과정을 봐야 한다.", "sentences": [{"id": 1, "original": "A number of research studies have shown how experts in a field often experience difficulties when introducing newcomers to that field.", "explanation": "여러 연구는 한 분야의 전문가들이 그 분야를 처음 배우는 사람들에게 가르칠 때 자주 어려움을 겪는다는 것을 보여 주었다.", "vocabulary": [{"word": "a number of", "meaning": "여러, 많은", "note": "뒤에 복수 명사가 온다."}, {"word": "field", "meaning": "분야", "note": "학문, 일, 관심 영역을 말할 때 자주 쓴다."}, {"word": "experience difficulties", "meaning": "어려움을 겪다", "note": "experience는 여기서 '경험하다'보다 '겪다'에 가깝다."}, {"word": "newcomer", "meaning": "새로 들어온 사람, 초보자", "note": "어떤 분야를 막 시작한 사람을 뜻한다."}]}, {"id": 2, "original": "For example, in a genuine training situation, Dr Pamela Hinds found that people expert in using mobile phones were remarkably less accurate than novice phone users in judging how long it takes people to learn to use the phones.", "explanation": "예를 들어, 실제 훈련 상황에서 파멜라 하인즈 박사는 휴대전화를 잘 다루는 사람들이, 초보 사용자보다 다른 사람이 그 휴대전화를 배우는 데 얼마나 걸리는지 더 부정확하게 판단한다는 것을 알아냈다.", "vocabulary": [{"word": "genuine", "meaning": "진짜의, 실제의", "note": "여기서는 꾸며 낸 상황이 아닌 실제 상황이라는 뜻이다."}, {"word": "remarkably", "meaning": "눈에 띄게, 매우", "note": "차이가 분명히 보일 때 쓴다."}, {"word": "novice", "meaning": "초보의, 초보자", "note": "beginner와 비슷한 뜻이다."}, {"word": "accurate", "meaning": "정확한", "note": "less accurate는 '덜 정확한'이라는 뜻이다."}, {"word": "judge", "meaning": "판단하다", "note": "judging how long...은 '얼마나 걸리는지 판단하는 것'이다."}]}, {"id": 3, "original": "Experts can become insensitive to how hard a task is for the beginner, an effect referred to as the ‘curse of knowledge’.", "explanation": "전문가는 어떤 일이 초보자에게 얼마나 어려운지 잘 느끼지 못하게 될 수 있다. 이런 현상을 '지식의 저주'라고 부른다.", "vocabulary": [{"word": "insensitive to", "meaning": "~에 둔감한, 잘 느끼지 못하는", "note": "사람의 감정뿐 아니라 어려움이나 차이에도 쓸 수 있다."}, {"word": "task", "meaning": "과제, 해야 할 일", "note": "공부나 훈련에서 해야 하는 일을 가리킨다."}, {"word": "referred to as", "meaning": "~라고 불리는", "note": "이름을 붙여 말할 때 쓰는 표현이다."}, {"word": "curse of knowledge", "meaning": "지식의 저주", "note": "내가 이미 아는 것을 남도 쉽게 알 거라고 여기게 되는 현상이다."}]}, {"id": 4, "original": "Dr Hinds was able to show that as people acquired the skill, they then began to underestimate the level of difficulty of that skill.", "explanation": "하인즈 박사는 사람들이 그 기술을 익히게 되면, 그다음부터는 그 기술이 얼마나 어려운지 실제보다 낮게 보게 된다는 점을 보여 줄 수 있었다.", "vocabulary": [{"word": "acquire", "meaning": "익히다, 얻다", "note": "기술이나 지식을 배우게 될 때 자주 쓴다."}, {"word": "underestimate", "meaning": "실제보다 낮게 보다, 과소평가하다", "note": "반대말은 overestimate이다."}, {"word": "level of difficulty", "meaning": "어려운 정도", "note": "difficulty만 써도 비슷한 뜻이지만, 정도를 더 분명히 보여 준다."}]}, {"id": 5, "original": "Her participants even underestimated how long it had taken themselves to acquire that skill in an earlier session.", "explanation": "실험에 참여한 사람들은 심지어 자기 자신이 예전 시간에 그 기술을 익히는 데 얼마나 오래 걸렸는지도 실제보다 짧게 생각했다.", "vocabulary": [{"word": "participant", "meaning": "참가자, 참여자", "note": "실험이나 조사에 참여한 사람을 말한다."}, {"word": "even", "meaning": "심지어", "note": "예상보다 더 놀라운 내용을 덧붙일 때 쓴다."}, {"word": "earlier session", "meaning": "이전 시간, 앞선 회기", "note": "session은 수업, 훈련, 실험의 한 차례를 뜻할 수 있다."}, {"word": "it had taken", "meaning": "~하는 데 걸렸다", "note": "시간이 얼마나 들었는지 말하는 표현이다."}]}, {"id": 6, "original": "Knowing that experts forget how hard it was for them to learn, we can understand the need to look at the learning process through students’ eyes, rather than making assumptions about how students ‘should be’ learning.", "explanation": "전문가가 자신도 처음 배울 때 얼마나 힘들었는지 잊는다는 사실을 알면, 우리는 학생이 배우는 과정을 학생의 눈으로 보아야 한다는 점을 이해할 수 있다. 학생은 원래 이렇게 배워야 한다고 미리 단정해서는 안 된다.", "vocabulary": [{"word": "learning process", "meaning": "배우는 과정", "note": "결과보다 배우는 중간 과정을 가리킨다."}, {"word": "through students’ eyes", "meaning": "학생의 눈으로, 학생의 입장에서", "note": "상대의 처지에서 본다는 뜻의 표현이다."}, {"word": "rather than", "meaning": "~하기보다", "note": "둘 중 하나를 고를 때 앞의 내용을 더 강조한다."}, {"word": "make assumptions", "meaning": "짐작으로 단정하다", "note": "충분한 근거 없이 그렇게 생각해 버리는 것이다."}, {"word": "should be", "meaning": "그래야 한다, 마땅히 ~해야 한다", "note": "여기서는 '학생은 이렇게 배워야 한다'는 고정된 생각을 말한다."}]}]};

// ── Levenshtein distance ──
function lev(a, b) {
  const m = a.length, n = b.length;
  const dp = Array.from({ length: m + 1 }, () => Array(n + 1).fill(0));
  for (let i = 0; i <= m; i++) dp[i][0] = i;
  for (let j = 0; j <= n; j++) dp[0][j] = j;
  for (let i = 1; i <= m; i++)
    for (let j = 1; j <= n; j++)
      dp[i][j] = Math.min(
        dp[i-1][j] + 1,
        dp[i][j-1] + 1,
        dp[i-1][j-1] + (a[i-1] !== b[j-1] ? 1 : 0)
      );
  return dp[m][n];
}

// ── Tokenizer ──
function tokenize(text) {
  const re = /[A-Za-z\u2019']+(?:-[A-Za-z\u2019']+)*/g;
  const tokens = []; let m;
  while ((m = re.exec(text)) !== null)
    tokens.push({ text: m[0], start: m.index, end: m.index + m[0].length });
  return tokens;
}

function findConsecutive(text, phraseWords) {
  const tokens = tokenize(text);
  for (let i = 0; i <= tokens.length - phraseWords.length; i++) {
    let ok = true;
    for (let j = 0; j < phraseWords.length; j++)
      if (tokens[i+j].text.toLowerCase() !== phraseWords[j]) { ok = false; break; }
    if (ok) return { start: tokens[i].start, end: tokens[i + phraseWords.length - 1].end };
  }
  return null;
}

// ── Highlight logic ──
function highlightSentence(text, vocabList) {
  const ranges = [];
  const lower = text.toLowerCase();

  for (let vi = 0; vi < vocabList.length; vi++) {
    const v = vocabList[vi];
    const phrase = v.word.toLowerCase().replace(/\s*\(.*?\)\s*/g, '').trim();

    // 1) Exact substring
    const idx = lower.indexOf(phrase);
    if (idx !== -1) { ranges.push({ start: idx, end: idx + phrase.length, vi }); continue; }

    // 2) Multi-word consecutive
    const pw = phrase.split(/\s+/);
    if (pw.length > 1) {
      const found = findConsecutive(text, pw);
      if (found) { ranges.push({ ...found, vi }); continue; }
    }

    // 3) Fuzzy per token
    const tokens = tokenize(text);
    for (const w of pw) {
      let bestD = Infinity, bestT = null;
      const thresh = Math.max(2, Math.floor(w.length * 0.35));
      for (const t of tokens) {
        const d = lev(w, t.text.toLowerCase());
        if (d < bestD) { bestD = d; bestT = t; }
      }
      if (bestT && bestD <= thresh) ranges.push({ start: bestT.start, end: bestT.end, vi });
    }
  }

  // Merge overlapping (collect vocab indices)
  ranges.sort((a, b) => a.start - b.start);
  const merged = [];
  for (const r of ranges) {
    if (merged.length && r.start <= merged[merged.length-1].end) {
      merged[merged.length-1].end = Math.max(merged[merged.length-1].end, r.end);
      merged[merged.length-1].vis.add(r.vi);
    } else {
      merged.push({ start: r.start, end: r.end, vis: new Set([r.vi]) });
    }
  }

  let result = '', last = 0;
  for (const r of merged) {
    result += esc(text.slice(last, r.start));
    const idxs = [...r.vis].join(',');
    result += '<span class="hw" data-vocab="' + idxs + '">' + esc(text.slice(r.start, r.end)) + '</span>';
    last = r.end;
  }
  return result + esc(text.slice(last));
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Render ──
let cur = 0;
const total = DATA.sentences ? DATA.sentences.length : 0;

function render() {
  if (!total) { document.getElementById('content').innerHTML = '<p>데이터가 없습니다.</p>'; return; }
  const s = DATA.sentences[cur];
  const vocabHtml = s.vocabulary.map(v => `
    <div class="vocab-item">
      <div class="vocab-word">${esc(v.word)}</div>
      <div class="vocab-meaning">${esc(v.meaning)}</div>
      ${v.note ? `<div class="vocab-note">${esc(v.note)}</div>` : ''}
    </div>`).join('');

  document.getElementById('content').innerHTML = `
    <div class="section-label">원문</div>
    <div class="original-card">${highlightSentence(s.original, s.vocabulary)}</div>
    <div class="section-label">해설</div>
    <div class="explain-card">${esc(s.explanation)}</div>
    <div class="section-label">주요 단어</div>
    <div class="vocab-list">${vocabHtml}</div>`;

  const label = `${cur+1} / ${total}`;
  document.getElementById('progressLabel').textContent = label;
  document.getElementById('navIndicator').textContent = label;
  document.getElementById('progressFill').style.width = `${((cur+1)/total)*100}%`;
  document.getElementById('prevBtn').disabled = cur === 0;
  document.getElementById('nextBtn').disabled = false;
  document.getElementById('nextBtn').textContent = cur === total - 1 ? '결과 \u203A' : '다음 \u203A';
  document.getElementById('content').scrollTop = 0;
}

// ── Quiz State ──
let quizActive = false;
let quizQueue = [];
let quizIdx = 0;
let quizAnswered = false;
const allWrongWords = []; // {word, meaning} across entire passage

// Collect all vocab from entire passage for distractor pool
function getAllVocab() {
  const all = [];
  for (const s of DATA.sentences) {
    if (s.vocabulary) {
      for (const v of s.vocabulary) all.push(v);
    }
  }
  return all;
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function makeChoices(q) {
  const allVocab = getAllVocab();
  const correct = q.isEn2Ko ? q.meaning : q.word;
  // Gather distractors from other vocab
  const pool = allVocab
    .map(v => q.isEn2Ko ? v.meaning : v.word)
    .filter(t => t !== correct);
  // Deduplicate
  const unique = [...new Set(pool)];
  shuffle(unique);
  const distractors = unique.slice(0, 3);
  // Combine and shuffle
  const choices = [correct, ...distractors];
  shuffle(choices);
  return { choices, correctIdx: choices.indexOf(correct) };
}

function go(dir) {
  if (quizActive) return;
  if (dir === -1 && cur === 0) return;

  // Going forward → show quiz for current sentence first
  if (dir === 1) {
    startQuiz();
    return;
  }
  cur = cur + dir; render();
}

function startQuiz() {
  const s = DATA.sentences[cur];
  if (!s.vocabulary || s.vocabulary.length === 0) {
    if (cur === total - 1) { showWrongSummary(); return; }
    cur++; render();
    return;
  }

  quizQueue = s.vocabulary.map(v => {
    const isEn2Ko = Math.random() < 0.5;
    return { word: v.word, meaning: v.meaning, isEn2Ko };
  });
  shuffle(quizQueue);
  quizIdx = 0;
  quizActive = true;
  showQuizQuestion();
}

function showQuizQuestion() {
  quizAnswered = false;
  const q = quizQueue[quizIdx];
  const dirClass = q.isEn2Ko ? 'en2ko' : 'ko2en';
  const dirLabel = q.isEn2Ko ? 'English → 한국어' : '한국어 → English';
  const prompt = q.isEn2Ko ? q.word : q.meaning;
  const { choices, correctIdx } = makeChoices(q);

  const choicesHtml = choices.map((c, i) =>
    `<button class="quiz-choice" data-idx="${i}" data-correct="${i === correctIdx ? 1 : 0}" onclick="pickChoice(this)">${esc(c)}</button>`
  ).join('');

  const overlay = document.createElement('div');
  overlay.className = 'quiz-overlay';
  overlay.id = 'quizOverlay';
  overlay.innerHTML = `
    <div class="quiz-box">
      <div class="quiz-header">
        <span class="quiz-title">단어 퀴즈</span>
        <span class="quiz-progress">${quizIdx + 1} / ${quizQueue.length}</span>
      </div>
      <span class="quiz-direction ${dirClass}">${dirLabel}</span>
      <div class="quiz-prompt">${esc(prompt)}</div>
      <div class="quiz-choices">${choicesHtml}</div>
      <div id="quizFeedback"></div>
    </div>`;
  document.body.appendChild(overlay);
}

function pickChoice(btn) {
  if (quizAnswered) return;
  quizAnswered = true;
  const q = quizQueue[quizIdx];
  const isCorrect = btn.dataset.correct === '1';

  // Disable all buttons
  const allBtns = document.querySelectorAll('.quiz-choice');
  allBtns.forEach(b => {
    b.disabled = true;
    if (b.dataset.correct === '1') b.classList.add('reveal-correct');
  });

  if (isCorrect) {
    btn.classList.add('chosen-correct');
  } else {
    btn.classList.add('chosen-wrong');
    allWrongWords.push({ word: q.word, meaning: q.meaning });
  }

  const fb = document.getElementById('quizFeedback');
  const label = quizIdx < quizQueue.length - 1 ? '다음 문제' : '완료';
  if (isCorrect) {
    fb.innerHTML = `<div class="quiz-feedback correct">정답!</div>
      <button class="quiz-next-btn" onclick="advanceQuiz()">${label}</button>`;
  } else {
    const correctFull = q.isEn2Ko ? q.meaning : q.word;
    fb.innerHTML = `<div class="quiz-feedback wrong">오답! 정답: <span class="fb-answer">${esc(correctFull)}</span></div>
      <button class="quiz-next-btn" onclick="advanceQuiz()">${label}</button>`;
  }
}

function advanceQuiz() {
  const overlay = document.getElementById('quizOverlay');
  if (overlay) overlay.remove();

  quizIdx++;
  if (quizIdx < quizQueue.length) {
    showQuizQuestion();
    return;
  }

  // Quiz done for this sentence
  quizActive = false;
  const isLast = cur === total - 1;

  if (isLast) {
    // Show wrong words summary after last sentence
    showWrongSummary();
  } else {
    cur++;
    render();
  }
}

function showWrongSummary() {
  const overlay = document.createElement('div');
  overlay.className = 'wrong-summary-overlay';

  let inner = '';
  if (allWrongWords.length === 0) {
    inner = `<div class="wrong-summary-perfect">모든 단어를 맞혔습니다!</div>`;
  } else {
    inner = `<div class="wrong-summary-title">틀린 단어 (${allWrongWords.length}개)</div>`;
    // Deduplicate
    const seen = new Set();
    for (const w of allWrongWords) {
      const key = w.word + '|' + w.meaning;
      if (seen.has(key)) continue;
      seen.add(key);
      inner += `<div class="wrong-item"><div class="wi-word">${esc(w.word)}</div><div class="wi-meaning">${esc(w.meaning)}</div></div>`;
    }
  }
  inner += `<button class="wrong-close-btn" onclick="this.closest('.wrong-summary-overlay').remove()">닫기</button>`;

  overlay.innerHTML = `<div class="wrong-summary-box">${inner}</div>`;
  document.body.appendChild(overlay);
}

// Keyboard
document.addEventListener('keydown', e => {
  if (quizActive) return;
  if (e.key === 'ArrowLeft') go(-1);
  if (e.key === 'ArrowRight') go(1);
});
// Swipe
let sx = 0;
document.addEventListener('touchstart', e => { sx = e.touches[0].clientX; });
document.addEventListener('touchend', e => {
  if (quizActive) return;
  const d = e.changedTouches[0].clientX - sx;
  if (Math.abs(d) > 60) go(d < 0 ? 1 : -1);
});

// ── Tooltip ──
function hideTooltip() {
  document.querySelectorAll('.vocab-tooltip, .tooltip-overlay').forEach(el => el.remove());
}

function showTooltip(hwEl) {
  hideTooltip();
  const s = DATA.sentences[cur];
  const idxs = hwEl.dataset.vocab.split(',').map(Number);
  const vocabs = idxs.map(i => s.vocabulary[i]).filter(Boolean);
  if (!vocabs.length) return;

  // Build tooltip content
  const inner = vocabs.map((v, i) =>
    (i > 0 ? '<hr class="tt-sep">' : '') +
    '<div class="tt-word">' + esc(v.word) + '</div>' +
    '<div class="tt-meaning">' + esc(v.meaning) + '</div>' +
    (v.note ? '<div class="tt-note">' + esc(v.note) + '</div>' : '')
  ).join('');

  // Overlay to catch outside clicks
  const overlay = document.createElement('div');
  overlay.className = 'tooltip-overlay';
  overlay.addEventListener('click', hideTooltip);
  document.body.appendChild(overlay);

  // Tooltip element
  const tip = document.createElement('div');
  tip.className = 'vocab-tooltip';
  tip.innerHTML = inner;
  document.body.appendChild(tip);

  // Position
  const rect = hwEl.getBoundingClientRect();
  const tipH = tip.offsetHeight;
  const tipW = tip.offsetWidth;
  const spaceAbove = rect.top;
  const showAbove = spaceAbove > tipH + 16;

  let top, leftPos;
  if (showAbove) {
    top = rect.top + window.scrollY - tipH - 10;
    tip.classList.add('above');
  } else {
    top = rect.bottom + window.scrollY + 10;
    tip.classList.add('below');
  }
  leftPos = rect.left + window.scrollX + rect.width / 2 - tipW / 2;
  leftPos = Math.max(8, Math.min(leftPos, window.innerWidth - tipW - 8));

  tip.style.top = top + 'px';
  tip.style.left = leftPos + 'px';
}

document.addEventListener('click', e => {
  const hw = e.target.closest('.hw');
  if (hw && hw.dataset.vocab) { e.stopPropagation(); showTooltip(hw); }
});

// Init
if (DATA.title) document.getElementById('pageTitle').textContent = DATA.title;
render();
</script>
</body>
