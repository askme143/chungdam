<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>문장별 해설 뷰어</title>
<style>
  :root {
    --bg: #f8f7f4;
    --card: #ffffff;
    --accent: #2563eb;
    --accent-light: #dbeafe;
    --highlight: #fef08a;
    --highlight-border: #eab308;
    --text: #1e293b;
    --text-sub: #64748b;
    --border: #e2e8f0;
    --vocab-bg: #f1f5f9;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                 "Noto Sans KR", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    position: relative;
    text-align: center;
    padding: 1.5rem 1rem 1rem;
    border-bottom: 1px solid var(--border);
    background: var(--card);
  }
  .home-btn {
    position: absolute;
    left: 1rem;
    top: 50%;
    transform: translateY(-50%);
    display: inline-flex;
    align-items: center;
    gap: 0.3rem;
    padding: 0.4rem 0.8rem;
    background: var(--accent-light);
    color: var(--accent);
    text-decoration: none;
    border-radius: 8px;
    font-size: 0.85rem;
    font-weight: 600;
    transition: background 0.15s, color 0.15s;
  }
  .home-btn:hover {
    background: var(--accent);
    color: #fff;
  }
  header h1 {
    font-size: 1.1rem;
    font-weight: 700;
    word-break: keep-all;
  }
  .progress-row {
    margin-top: .6rem;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: .5rem;
    font-size: .85rem;
    color: var(--text-sub);
  }
  .progress-bar {
    width: 120px; height: 5px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 3px;
    transition: width .3s;
  }

  /* ── Main ── */
  main {
    flex: 1;
    overflow-y: auto;
    padding: 1.25rem 1rem 7rem;
    max-width: 640px;
    width: 100%;
    margin: 0 auto;
  }

  .section-label {
    font-size: .75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .05em;
    color: var(--accent);
    margin-bottom: .5rem;
  }

  /* Original sentence */
  .original-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem;
    font-size: 1.08rem;
    line-height: 1.75;
    margin-bottom: 1.25rem;
    word-break: keep-all;
  }
  .original-card .hw {
    background: var(--highlight);
    border-bottom: 2px solid var(--highlight-border);
    border-radius: 3px;
    padding: 0 1px;
    cursor: pointer;
    transition: background .15s;
  }
  .original-card .hw:hover {
    background: #fde047;
  }

  /* ── Tooltip ── */
  .tooltip-overlay {
    position: fixed;
    inset: 0;
    z-index: 99;
  }
  .vocab-tooltip {
    position: absolute;
    z-index: 100;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: .9rem 1rem;
    box-shadow: 0 4px 20px rgba(0,0,0,.12);
    max-width: 320px;
    width: max-content;
    animation: tooltipIn .15s ease;
  }
  .vocab-tooltip::after {
    content: '';
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    border: 8px solid transparent;
  }
  .vocab-tooltip.above::after {
    top: 100%;
    border-top-color: var(--card);
  }
  .vocab-tooltip.below::after {
    bottom: 100%;
    border-bottom-color: var(--card);
  }
  .vocab-tooltip .tt-word {
    font-weight: 700;
    color: var(--accent);
    font-size: .95rem;
    margin-bottom: .2rem;
  }
  .vocab-tooltip .tt-meaning {
    font-size: .9rem;
    line-height: 1.5;
  }
  .vocab-tooltip .tt-note {
    font-size: .8rem;
    color: var(--text-sub);
    margin-top: .15rem;
    line-height: 1.4;
  }
  .vocab-tooltip .tt-sep {
    border: none;
    border-top: 1px solid var(--border);
    margin: .5rem 0;
  }
  @keyframes tooltipIn {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Explanation */
  .explain-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem;
    font-size: .97rem;
    line-height: 1.8;
    margin-bottom: 1.25rem;
    color: var(--text);
  }

  /* Vocabulary */
  .vocab-list {
    display: flex;
    flex-direction: column;
    gap: .6rem;
  }
  .vocab-item {
    background: var(--vocab-bg);
    border-radius: 10px;
    padding: 1rem 1.1rem;
  }
  .vocab-word {
    font-weight: 700;
    font-size: 1rem;
    color: var(--accent);
  }
  .vocab-meaning {
    margin-top: .25rem;
    font-size: .93rem;
  }
  .vocab-note {
    margin-top: .2rem;
    font-size: .82rem;
    color: var(--text-sub);
  }

  /* ── Bottom Nav ── */
  .bottom-nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--card);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: .75rem 1rem;
    padding-bottom: max(.75rem, env(safe-area-inset-bottom));
    z-index: 10;
  }
  .nav-btn {
    display: flex;
    align-items: center;
    gap: .35rem;
    background: none;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: .6rem 1.1rem;
    font-size: .95rem;
    font-weight: 600;
    color: var(--text);
    cursor: pointer;
    transition: all .15s;
    min-width: 5.5rem;
    justify-content: center;
  }
  .nav-btn:active { transform: scale(.96); }
  .nav-btn:not(:disabled):hover {
    border-color: var(--accent);
    color: var(--accent);
  }
  .nav-btn:disabled { opacity: .3; cursor: default; }
  .nav-indicator {
    font-size: .85rem;
    font-weight: 600;
    color: var(--text-sub);
    min-width: 3rem;
    text-align: center;
  }

  /* Animation */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  main > * { animation: fadeIn .3s ease; }
</style>
</head>
<body>

<header>
  <a class="home-btn" href="../../">&#8592; 홈</a>
  <h1 id="pageTitle">문장별 해설</h1>
  <div class="progress-row">
    <span id="progressLabel">1 / ?</span>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  </div>
</header>

<main id="content"></main>

<nav class="bottom-nav">
  <button class="nav-btn" id="prevBtn" onclick="go(-1)">&#8249; 이전</button>
  <span class="nav-indicator" id="navIndicator">1 / ?</span>
  <button class="nav-btn" id="nextBtn" onclick="go(1)">다음 &#8250;</button>
</nav>

<script>
// ── DATA (injected by generate_html) ──
const DATA = {"title": "리더십은 특별한 사람만의 것이 아니다", "summary": "위대한 지도자들도 처음에는 평범한 학생과 시민이었으며, 아이디어를 발전시키고 다른 사람들과 협력하는 과정을 통해 누구나 리더가 될 가능성을 지닌다.", "sentences": [{"id": 1, "original": "When we think of leaders, we may think of people such as Abraham Lincoln or Martin Luther King, Jr.", "explanation": "우리가 리더를 떠올릴 때, 에이브러햄 링컨이나 마틴 루서 킹 주니어처럼 잘 알려진 위인들을 먼저 생각할 수 있다는 뜻이다.", "vocabulary": [{"word": "think of", "meaning": "떠올리다, 생각하다", "note": "문맥에 따라 '…을 생각하다' 또는 '…을 연상하다'로 해석된다."}, {"word": "leaders", "meaning": "지도자들, 리더들", "note": "leader의 복수형이다."}, {"word": "such as", "meaning": "예를 들어, …와 같은", "note": "대표적인 예시를 들 때 자주 쓰는 표현이다."}]}, {"id": 2, "original": "If you consider the historical importance and far-reaching influence of these individuals, leadership might seem like a noble and high goal.", "explanation": "이 인물들이 역사적으로 얼마나 중요했고 영향력이 얼마나 넓었는지를 생각해 보면, 리더십은 매우 고귀하고 수준 높은 목표처럼 보일 수 있다는 의미이다.", "vocabulary": [{"word": "historical importance", "meaning": "역사적 중요성", "note": "역사 속에서 차지하는 의미와 가치를 말한다."}, {"word": "far-reaching", "meaning": "광범위한, 광범하게 미치는", "note": "영향이나 결과가 넓게 퍼질 때 자주 쓰인다."}, {"word": "influence", "meaning": "영향(력)", "note": "have an influence on 형태로도 자주 쓰인다."}, {"word": "noble", "meaning": "고귀한, 숭고한", "note": "도덕적으로 높이 평가되는 성격을 나타낸다."}]}, {"id": 3, "original": "But like all of us, these people started out as students, workers, and citizens who possessed ideas about how some aspect of daily life could be improved on a larger scale.", "explanation": "하지만 이 사람들도 우리 모두와 마찬가지로 처음에는 학생, 노동자, 시민으로 시작했고, 일상생활의 어떤 부분을 더 큰 범위에서 더 나아지게 할 수 있을지에 대한 생각을 가진 사람들이었다는 뜻이다.", "vocabulary": [{"word": "started out as", "meaning": "처음에는 …로 시작했다", "note": "어떤 출발점이나 초기 상태를 나타내는 표현이다."}, {"word": "possessed", "meaning": "지니고 있었다, 가지고 있었다", "note": "possess는 다소 격식 있는 표현으로 '소유하다, 지니다'를 뜻한다."}, {"word": "aspect", "meaning": "측면, 부분", "note": "어떤 사물이나 상황의 한 면을 가리킨다."}, {"word": "on a larger scale", "meaning": "더 큰 규모로, 더 넓은 차원에서", "note": "개인적 수준을 넘어 사회적 범위로 확대됨을 나타낸다."}]}, {"id": 4, "original": "Through diligence and experience, they improved upon their ideas by sharing them with others, seeking their opinions and feedback and constantly looking for the best way to accomplish goals for a group.", "explanation": "그들은 성실함과 경험을 바탕으로 자신의 생각을 다른 사람들과 나누고, 의견과 피드백을 구하며, 집단의 목표를 이루는 가장 좋은 방법을 계속 찾아 나감으로써 그 아이디어를 더 발전시켰다.", "vocabulary": [{"word": "diligence", "meaning": "성실함, 근면함", "note": "꾸준하고 부지런한 태도를 뜻한다."}, {"word": "improved upon", "meaning": "더 발전시켰다, 개선했다", "note": "improve on/upon은 기존의 것을 더 낫게 만들다는 뜻이다."}, {"word": "feedback", "meaning": "피드백, 반응 의견", "note": "다른 사람의 평가나 반응을 받아 개선할 때 중요하게 쓰인다."}, {"word": "accomplish", "meaning": "성취하다, 이루다", "note": "goal, task 등과 함께 자주 쓰인다."}]}, {"id": 5, "original": "Thus we all have the potential to be leaders at school, in our communities, and at work, regardless of age or experience.", "explanation": "따라서 나이나 경험과 상관없이 우리 모두는 학교, 지역사회, 직장에서 리더가 될 잠재력을 가지고 있다는 말이다.", "vocabulary": [{"word": "Thus", "meaning": "따라서, 그러므로", "note": "앞의 내용을 바탕으로 결론을 이끌 때 쓰인다."}, {"word": "potential", "meaning": "잠재력, 가능성", "note": "have the potential to do는 '…할 가능성이 있다'는 뜻이다."}, {"word": "communities", "meaning": "지역사회들, 공동체들", "note": "community는 지역사회뿐 아니라 공동체 전체를 뜻할 수 있다."}, {"word": "regardless of", "meaning": "…와 상관없이", "note": "뒤에 명사나 명사구가 온다."}]}]};

// ── Levenshtein distance ──
function lev(a, b) {
  const m = a.length, n = b.length;
  const dp = Array.from({ length: m + 1 }, () => Array(n + 1).fill(0));
  for (let i = 0; i <= m; i++) dp[i][0] = i;
  for (let j = 0; j <= n; j++) dp[0][j] = j;
  for (let i = 1; i <= m; i++)
    for (let j = 1; j <= n; j++)
      dp[i][j] = Math.min(
        dp[i-1][j] + 1,
        dp[i][j-1] + 1,
        dp[i-1][j-1] + (a[i-1] !== b[j-1] ? 1 : 0)
      );
  return dp[m][n];
}

// ── Tokenizer ──
function tokenize(text) {
  const re = /[A-Za-z\u2019']+(?:-[A-Za-z\u2019']+)*/g;
  const tokens = []; let m;
  while ((m = re.exec(text)) !== null)
    tokens.push({ text: m[0], start: m.index, end: m.index + m[0].length });
  return tokens;
}

function findConsecutive(text, phraseWords) {
  const tokens = tokenize(text);
  for (let i = 0; i <= tokens.length - phraseWords.length; i++) {
    let ok = true;
    for (let j = 0; j < phraseWords.length; j++)
      if (tokens[i+j].text.toLowerCase() !== phraseWords[j]) { ok = false; break; }
    if (ok) return { start: tokens[i].start, end: tokens[i + phraseWords.length - 1].end };
  }
  return null;
}

// ── Highlight logic ──
function highlightSentence(text, vocabList) {
  const ranges = [];
  const lower = text.toLowerCase();

  for (let vi = 0; vi < vocabList.length; vi++) {
    const v = vocabList[vi];
    const phrase = v.word.toLowerCase().replace(/\s*\(.*?\)\s*/g, '').trim();

    // 1) Exact substring
    const idx = lower.indexOf(phrase);
    if (idx !== -1) { ranges.push({ start: idx, end: idx + phrase.length, vi }); continue; }

    // 2) Multi-word consecutive
    const pw = phrase.split(/\s+/);
    if (pw.length > 1) {
      const found = findConsecutive(text, pw);
      if (found) { ranges.push({ ...found, vi }); continue; }
    }

    // 3) Fuzzy per token
    const tokens = tokenize(text);
    for (const w of pw) {
      let bestD = Infinity, bestT = null;
      const thresh = Math.max(2, Math.floor(w.length * 0.35));
      for (const t of tokens) {
        const d = lev(w, t.text.toLowerCase());
        if (d < bestD) { bestD = d; bestT = t; }
      }
      if (bestT && bestD <= thresh) ranges.push({ start: bestT.start, end: bestT.end, vi });
    }
  }

  // Merge overlapping (collect vocab indices)
  ranges.sort((a, b) => a.start - b.start);
  const merged = [];
  for (const r of ranges) {
    if (merged.length && r.start <= merged[merged.length-1].end) {
      merged[merged.length-1].end = Math.max(merged[merged.length-1].end, r.end);
      merged[merged.length-1].vis.add(r.vi);
    } else {
      merged.push({ start: r.start, end: r.end, vis: new Set([r.vi]) });
    }
  }

  let result = '', last = 0;
  for (const r of merged) {
    result += esc(text.slice(last, r.start));
    const idxs = [...r.vis].join(',');
    result += '<span class="hw" data-vocab="' + idxs + '">' + esc(text.slice(r.start, r.end)) + '</span>';
    last = r.end;
  }
  return result + esc(text.slice(last));
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Render ──
let cur = 0;
const total = DATA.sentences ? DATA.sentences.length : 0;

function render() {
  if (!total) { document.getElementById('content').innerHTML = '<p>데이터가 없습니다.</p>'; return; }
  const s = DATA.sentences[cur];
  const vocabHtml = s.vocabulary.map(v => `
    <div class="vocab-item">
      <div class="vocab-word">${esc(v.word)}</div>
      <div class="vocab-meaning">${esc(v.meaning)}</div>
      ${v.note ? `<div class="vocab-note">${esc(v.note)}</div>` : ''}
    </div>`).join('');

  document.getElementById('content').innerHTML = `
    <div class="section-label">원문</div>
    <div class="original-card">${highlightSentence(s.original, s.vocabulary)}</div>
    <div class="section-label">해설</div>
    <div class="explain-card">${esc(s.explanation)}</div>
    <div class="section-label">주요 단어</div>
    <div class="vocab-list">${vocabHtml}</div>`;

  const label = `${cur+1} / ${total}`;
  document.getElementById('progressLabel').textContent = label;
  document.getElementById('navIndicator').textContent = label;
  document.getElementById('progressFill').style.width = `${((cur+1)/total)*100}%`;
  document.getElementById('prevBtn').disabled = cur === 0;
  document.getElementById('nextBtn').disabled = cur === total - 1;
  document.getElementById('content').scrollTop = 0;
}

function go(dir) {
  const next = cur + dir;
  if (next < 0 || next >= total) return;
  cur = next; render();
}

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft') go(-1);
  if (e.key === 'ArrowRight') go(1);
});
// Swipe
let sx = 0;
document.addEventListener('touchstart', e => { sx = e.touches[0].clientX; });
document.addEventListener('touchend', e => {
  const d = e.changedTouches[0].clientX - sx;
  if (Math.abs(d) > 60) go(d < 0 ? 1 : -1);
});

// ── Tooltip ──
function hideTooltip() {
  document.querySelectorAll('.vocab-tooltip, .tooltip-overlay').forEach(el => el.remove());
}

function showTooltip(hwEl) {
  hideTooltip();
  const s = DATA.sentences[cur];
  const idxs = hwEl.dataset.vocab.split(',').map(Number);
  const vocabs = idxs.map(i => s.vocabulary[i]).filter(Boolean);
  if (!vocabs.length) return;

  // Build tooltip content
  const inner = vocabs.map((v, i) =>
    (i > 0 ? '<hr class="tt-sep">' : '') +
    '<div class="tt-word">' + esc(v.word) + '</div>' +
    '<div class="tt-meaning">' + esc(v.meaning) + '</div>' +
    (v.note ? '<div class="tt-note">' + esc(v.note) + '</div>' : '')
  ).join('');

  // Overlay to catch outside clicks
  const overlay = document.createElement('div');
  overlay.className = 'tooltip-overlay';
  overlay.addEventListener('click', hideTooltip);
  document.body.appendChild(overlay);

  // Tooltip element
  const tip = document.createElement('div');
  tip.className = 'vocab-tooltip';
  tip.innerHTML = inner;
  document.body.appendChild(tip);

  // Position
  const rect = hwEl.getBoundingClientRect();
  const tipH = tip.offsetHeight;
  const tipW = tip.offsetWidth;
  const spaceAbove = rect.top;
  const showAbove = spaceAbove > tipH + 16;

  let top, leftPos;
  if (showAbove) {
    top = rect.top + window.scrollY - tipH - 10;
    tip.classList.add('above');
  } else {
    top = rect.bottom + window.scrollY + 10;
    tip.classList.add('below');
  }
  leftPos = rect.left + window.scrollX + rect.width / 2 - tipW / 2;
  leftPos = Math.max(8, Math.min(leftPos, window.innerWidth - tipW - 8));

  tip.style.top = top + 'px';
  tip.style.left = leftPos + 'px';
}

document.addEventListener('click', e => {
  const hw = e.target.closest('.hw');
  if (hw && hw.dataset.vocab) { e.stopPropagation(); showTooltip(hw); }
});

// Init
if (DATA.title) document.getElementById('pageTitle').textContent = DATA.title;
render();
</script>
</body>
</html>
