<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>문장별 해설 뷰어</title>
<style>
  :root {
    --bg: #f8f7f4;
    --card: #ffffff;
    --accent: #2563eb;
    --accent-light: #dbeafe;
    --highlight: #fef08a;
    --highlight-border: #eab308;
    --text: #1e293b;
    --text-sub: #64748b;
    --border: #e2e8f0;
    --vocab-bg: #f1f5f9;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                 "Noto Sans KR", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    position: relative;
    text-align: center;
    padding: 1.5rem 1rem 1rem;
    border-bottom: 1px solid var(--border);
    background: var(--card);
  }
  .home-btn {
    position: absolute;
    left: 1rem;
    top: 50%;
    transform: translateY(-50%);
    display: inline-flex;
    align-items: center;
    gap: 0.3rem;
    padding: 0.4rem 0.8rem;
    background: var(--accent-light);
    color: var(--accent);
    text-decoration: none;
    border-radius: 8px;
    font-size: 0.85rem;
    font-weight: 600;
    transition: background 0.15s, color 0.15s;
  }
  .home-btn:hover {
    background: var(--accent);
    color: #fff;
  }
  .quiz-toggle {
    position: absolute;
    right: 1rem;
    top: 50%;
    transform: translateY(-50%);
    display: inline-flex;
    align-items: center;
    gap: 0.35rem;
    padding: 0.4rem 0.7rem;
    background: var(--accent-light);
    color: var(--accent);
    border: none;
    border-radius: 8px;
    font-size: 0.78rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    font-family: inherit;
  }
  .quiz-toggle:hover {
    background: var(--accent);
    color: #fff;
  }
  .quiz-toggle.off {
    background: var(--border);
    color: var(--text-sub);
  }
  .quiz-toggle.off:hover {
    background: #cbd5e1;
    color: var(--text);
  }
  header h1 {
    font-size: 1.1rem;
    font-weight: 700;
    word-break: keep-all;
  }
  .progress-row {
    margin-top: .6rem;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: .5rem;
    font-size: .85rem;
    color: var(--text-sub);
  }
  .progress-bar {
    width: 120px; height: 5px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 3px;
    transition: width .3s;
  }

  /* ── Main ── */
  main {
    flex: 1;
    overflow-y: auto;
    padding: 1.25rem 1rem 7rem;
    max-width: 640px;
    width: 100%;
    margin: 0 auto;
  }

  .section-label {
    font-size: .75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .05em;
    color: var(--accent);
    margin-bottom: .5rem;
  }

  /* Original sentence */
  .original-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem;
    font-size: 1.08rem;
    line-height: 1.75;
    margin-bottom: 1.25rem;
    word-break: keep-all;
  }
  .original-card .hw {
    background: var(--highlight);
    border-bottom: 2px solid var(--highlight-border);
    border-radius: 3px;
    padding: 0 1px;
    cursor: pointer;
    transition: background .15s;
  }
  .original-card .hw:hover {
    background: #fde047;
  }

  /* ── Tooltip ── */
  .tooltip-overlay {
    position: fixed;
    inset: 0;
    z-index: 99;
  }
  .vocab-tooltip {
    position: absolute;
    z-index: 100;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: .9rem 1rem;
    box-shadow: 0 4px 20px rgba(0,0,0,.12);
    max-width: 320px;
    width: max-content;
    animation: tooltipIn .15s ease;
  }
  .vocab-tooltip::after {
    content: '';
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    border: 8px solid transparent;
  }
  .vocab-tooltip.above::after {
    top: 100%;
    border-top-color: var(--card);
  }
  .vocab-tooltip.below::after {
    bottom: 100%;
    border-bottom-color: var(--card);
  }
  .vocab-tooltip .tt-word {
    font-weight: 700;
    color: var(--accent);
    font-size: .95rem;
    margin-bottom: .2rem;
  }
  .vocab-tooltip .tt-meaning {
    font-size: .9rem;
    line-height: 1.5;
  }
  .vocab-tooltip .tt-note {
    font-size: .8rem;
    color: var(--text-sub);
    margin-top: .15rem;
    line-height: 1.4;
  }
  .vocab-tooltip .tt-sep {
    border: none;
    border-top: 1px solid var(--border);
    margin: .5rem 0;
  }
  @keyframes tooltipIn {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Explanation */
  .explain-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem;
    font-size: .97rem;
    line-height: 1.8;
    margin-bottom: 1.25rem;
    color: var(--text);
  }

  /* Vocabulary */
  .vocab-list {
    display: flex;
    flex-direction: column;
    gap: .6rem;
  }
  .vocab-item {
    background: var(--vocab-bg);
    border-radius: 10px;
    padding: 1rem 1.1rem;
  }
  .vocab-word {
    font-weight: 700;
    font-size: 1rem;
    color: var(--accent);
  }
  .vocab-meaning {
    margin-top: .25rem;
    font-size: .93rem;
  }
  .vocab-note {
    margin-top: .2rem;
    font-size: .82rem;
    color: var(--text-sub);
  }

  /* ── Bottom Nav ── */
  .bottom-nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--card);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: .75rem 1rem;
    padding-bottom: max(.75rem, env(safe-area-inset-bottom));
    z-index: 10;
  }
  .nav-btn {
    display: flex;
    align-items: center;
    gap: .35rem;
    background: none;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: .6rem 1.1rem;
    font-size: .95rem;
    font-weight: 600;
    color: var(--text);
    cursor: pointer;
    transition: all .15s;
    min-width: 5.5rem;
    justify-content: center;
  }
  .nav-btn:active { transform: scale(.96); }
  .nav-btn:not(:disabled):hover {
    border-color: var(--accent);
    color: var(--accent);
  }
  .nav-btn:disabled { opacity: .3; cursor: default; }
  .nav-indicator {
    font-size: .85rem;
    font-weight: 600;
    color: var(--text-sub);
    min-width: 3rem;
    text-align: center;
  }

  /* Animation */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  main > * { animation: fadeIn .3s ease; }

  /* ── Quiz Modal ── */
  .quiz-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.45);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    animation: fadeIn .2s ease;
  }
  .quiz-box {
    background: var(--card);
    border-radius: 16px;
    padding: 1.5rem;
    max-width: 420px;
    width: 100%;
    box-shadow: 0 8px 32px rgba(0,0,0,.18);
    animation: fadeIn .25s ease;
  }
  .quiz-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1rem;
  }
  .quiz-title {
    font-size: 1rem;
    font-weight: 700;
    color: var(--accent);
  }
  .quiz-progress {
    font-size: .82rem;
    color: var(--text-sub);
    font-weight: 600;
  }
  .quiz-direction {
    display: inline-block;
    font-size: .72rem;
    font-weight: 600;
    padding: .2rem .55rem;
    border-radius: 6px;
    margin-bottom: .6rem;
  }
  .quiz-direction.en2ko {
    background: #dbeafe;
    color: #1d4ed8;
  }
  .quiz-direction.ko2en {
    background: #fef3c7;
    color: #92400e;
  }
  .quiz-prompt {
    font-size: 1.15rem;
    font-weight: 700;
    margin-bottom: 1rem;
    line-height: 1.5;
    word-break: keep-all;
  }
  .quiz-choices {
    display: flex;
    flex-direction: column;
    gap: .5rem;
  }
  .quiz-choice {
    width: 100%;
    text-align: left;
    background: var(--vocab-bg);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: .7rem 1rem;
    font-size: .95rem;
    font-family: inherit;
    color: var(--text);
    cursor: pointer;
    transition: all .15s;
    line-height: 1.4;
    word-break: keep-all;
  }
  .quiz-choice:hover:not(:disabled) {
    border-color: var(--accent);
    background: var(--accent-light);
  }
  .quiz-choice:disabled {
    cursor: default;
  }
  .quiz-choice.chosen-correct {
    background: #dcfce7;
    border-color: #22c55e;
    color: #166534;
    font-weight: 600;
  }
  .quiz-choice.chosen-wrong {
    background: #fef2f2;
    border-color: #ef4444;
    color: #991b1b;
  }
  .quiz-choice.reveal-correct {
    background: #dcfce7;
    border-color: #22c55e;
    color: #166534;
    font-weight: 600;
  }
  .quiz-feedback {
    margin-top: .8rem;
    padding: .75rem 1rem;
    border-radius: 10px;
    font-size: .93rem;
    line-height: 1.5;
    animation: fadeIn .2s ease;
  }
  .quiz-feedback.correct {
    background: #dcfce7;
    color: #166534;
    border: 1px solid #bbf7d0;
  }
  .quiz-feedback.wrong {
    background: #fef2f2;
    color: #991b1b;
    border: 1px solid #fecaca;
  }
  .quiz-feedback .fb-answer {
    font-weight: 700;
  }
  .quiz-next-btn {
    margin-top: .8rem;
    width: 100%;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: .7rem;
    font-size: .95rem;
    font-weight: 600;
    cursor: pointer;
    transition: background .15s;
  }
  .quiz-next-btn:hover {
    background: #1d4ed8;
  }

  /* ── Wrong Words Summary ── */
  .wrong-summary-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.45);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    animation: fadeIn .2s ease;
  }
  .wrong-summary-box {
    background: var(--card);
    border-radius: 16px;
    padding: 1.5rem;
    max-width: 480px;
    width: 100%;
    max-height: 80vh;
    overflow-y: auto;
    box-shadow: 0 8px 32px rgba(0,0,0,.18);
    animation: fadeIn .25s ease;
  }
  .wrong-summary-title {
    font-size: 1.05rem;
    font-weight: 700;
    color: #991b1b;
    margin-bottom: 1rem;
    text-align: center;
  }
  .wrong-summary-perfect {
    font-size: 1.05rem;
    font-weight: 700;
    color: #166534;
    margin-bottom: 1rem;
    text-align: center;
  }
  .wrong-item {
    background: #fef2f2;
    border: 1px solid #fecaca;
    border-radius: 10px;
    padding: .8rem 1rem;
    margin-bottom: .5rem;
  }
  .wrong-item .wi-word {
    font-weight: 700;
    color: #1d4ed8;
    font-size: .95rem;
  }
  .wrong-item .wi-meaning {
    font-size: .9rem;
    color: var(--text);
    margin-top: .15rem;
  }
  .wrong-close-btn {
    margin-top: 1rem;
    width: 100%;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: .7rem;
    font-size: .95rem;
    font-weight: 600;
    cursor: pointer;
  }
</style>
</head>
<body>

<header>
  <a class="home-btn" href="../../">&#8592; 홈</a>
  <button class="quiz-toggle" id="quizToggle" onclick="toggleQuizMode()">퀴즈 ON</button>
  <h1 id="pageTitle">문장별 해설</h1>
  <div class="progress-row">
    <span id="progressLabel">1 / ?</span>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  </div>
</header>

<main id="content"></main>

<nav class="bottom-nav">
  <button class="nav-btn" id="prevBtn" onclick="go(-1)">&#8249; 이전</button>
  <span class="nav-indicator" id="navIndicator">1 / ?</span>
  <button class="nav-btn" id="nextBtn" onclick="go(1)">다음 &#8250;</button>
</nav>

<script>
// ── DATA (injected by generate_html) ──
const DATA = {"title": "잉카의 달리기 전령 제도", "summary": "잉카 제국은 말이 없어도 길마다 전령을 두고 이어 달리게 해서 아주 빠르게 소식을 전했다.", "sentences": [{"id": 1, "original": "With no horses available, the Inca empire excelled at delivering messages on foot.", "explanation": "쓸 수 있는 말이 없었기 때문에, 잉카 제국은 사람이 직접 뛰어서 소식을 전하는 일에 아주 뛰어났다.", "vocabulary": [{"word": "available", "meaning": "쓸 수 있는, 이용할 수 있는", "note": "여기서는 '구할 수 있는 말'이라는 뜻이다."}, {"word": "excel at", "meaning": "~을 아주 잘하다", "note": "be good at보다 더 뛰어남을 강하게 보여 준다."}, {"word": "on foot", "meaning": "걸어서, 발로", "note": "탈것을 타지 않고 직접 이동한다는 뜻이다."}]}, {"id": 2, "original": "The messengers were stationed on the royal roads to deliver the Inca king’s orders and reports coming from his lands.", "explanation": "전령들은 왕의 길에 배치되어 있었다. 그들은 잉카 왕의 명령을 전하고, 나라 곳곳에서 올라오는 보고를 전달하는 일을 했다.", "vocabulary": [{"word": "stationed", "meaning": "배치된, 머무르게 된", "note": "특정한 자리에 보내 두었다는 뜻이다."}, {"word": "royal roads", "meaning": "왕의 길, 왕이 쓰는 큰 길", "note": "잉카 제국의 중요한 도로를 가리킨다."}, {"word": "orders", "meaning": "명령", "note": "왕이나 윗사람이 내리는 지시를 말한다."}, {"word": "reports", "meaning": "보고, 보고 내용", "note": "어떤 지역의 상황을 알려 주는 소식이다."}, {"word": "lands", "meaning": "영토, 나라의 땅", "note": "왕이 다스리는 지역 전체를 뜻한다."}]}, {"id": 3, "original": "Called Chasquis, they lived in groups of four to six in huts, placed from one to two miles apart along the roads.", "explanation": "이 전령들은 '차스키'라고 불렸다. 그들은 길을 따라 1~2마일 간격으로 놓인 오두막에서 4명에서 6명씩 함께 살았다.", "vocabulary": [{"word": "Called Chasquis", "meaning": "차스키라고 불리는", "note": "Chasquis는 잉카의 전령을 가리키는 이름이다."}, {"word": "in groups of four to six", "meaning": "4명에서 6명씩 무리를 지어", "note": ""}, {"word": "huts", "meaning": "오두막", "note": "작고 단순한 집을 말한다."}, {"word": "apart", "meaning": "떨어져", "note": "거리 간격이 있음을 나타낸다."}, {"word": "along the roads", "meaning": "길을 따라", "note": ""}]}, {"id": 4, "original": "They were all young men and especially good runners who watched the road in both directions.", "explanation": "그들은 모두 젊은 남자들이었고, 특히 달리기를 아주 잘했다. 또 길의 양쪽 방향을 모두 살피고 있었다.", "vocabulary": [{"word": "especially", "meaning": "특히", "note": ""}, {"word": "runners", "meaning": "달리는 사람들, 달리기 선수", "note": "여기서는 빨리 달리는 전령을 뜻한다."}, {"word": "in both directions", "meaning": "양쪽 방향으로, 두 방향 모두", "note": ""}, {"word": "watched", "meaning": "살폈다, 지켜보았다", "note": "그냥 보는 것이 아니라 주의 깊게 본다는 느낌이다."}]}, {"id": 5, "original": "If they caught sight of another messenger coming, they hurried out to meet them.", "explanation": "다른 전령이 오는 것이 보이면, 그들은 급히 밖으로 나가 그 전령을 맞으러 갔다.", "vocabulary": [{"word": "caught sight of", "meaning": "~이 보이다, ~을 발견하다", "note": "갑자기 눈에 들어왔다는 느낌이 있다."}, {"word": "hurried out", "meaning": "급히 밖으로 나갔다", "note": ""}, {"word": "meet", "meaning": "맞으러 가다, 만나다", "note": "여기서는 오는 사람을 받으러 나가는 뜻이다."}]}, {"id": 6, "original": "The Inca built the huts on high ground, in sight of one another.", "explanation": "잉카 사람들은 오두막들을 높은 곳에 지었다. 그래서 오두막들이 서로 보일 수 있었다.", "vocabulary": [{"word": "high ground", "meaning": "높은 지대", "note": ""}, {"word": "in sight of one another", "meaning": "서로 보이는 곳에", "note": "서로의 위치를 눈으로 확인할 수 있다는 뜻이다."}]}, {"id": 7, "original": "When a messenger neared the next hut, he began to call out and repeated the message three or four times to the one who was running out to meet him.", "explanation": "전령이 다음 오두막 가까이에 오면 큰 소리로 외치기 시작했다. 그리고 자신을 맞으러 뛰어나오는 전령에게 그 말을 세 번이나 네 번 되풀이해서 전했다.", "vocabulary": [{"word": "neared", "meaning": "가까이 갔다, 가까워졌다", "note": "near가 동사로 쓰인 모습이다."}, {"word": "call out", "meaning": "큰 소리로 외치다", "note": ""}, {"word": "repeated", "meaning": "되풀이했다", "note": "같은 말을 여러 번 다시 말했다는 뜻이다."}, {"word": "running out to meet him", "meaning": "그를 맞으러 뛰어나오는", "note": ""}]}, {"id": 8, "original": "The Inca empire could relay messages 1,000 miles (1,610 km) in three or four days under good conditions.", "explanation": "조건이 좋으면, 잉카 제국은 1,000마일(1,610km) 떨어진 곳까지도 소식을 3~4일 만에 전달할 수 있었다.", "vocabulary": [{"word": "relay", "meaning": "이어 전달하다", "note": "한 사람이 끝까지 가는 것이 아니라 중간중간 넘겨 주는 방식이다."}, {"word": "under good conditions", "meaning": "상황이 좋을 때, 조건이 좋으면", "note": "날씨나 길 상태 같은 것이 좋을 때를 말한다."}]}]};

// ── Levenshtein distance ──
function lev(a, b) {
  const m = a.length, n = b.length;
  const dp = Array.from({ length: m + 1 }, () => Array(n + 1).fill(0));
  for (let i = 0; i <= m; i++) dp[i][0] = i;
  for (let j = 0; j <= n; j++) dp[0][j] = j;
  for (let i = 1; i <= m; i++)
    for (let j = 1; j <= n; j++)
      dp[i][j] = Math.min(
        dp[i-1][j] + 1,
        dp[i][j-1] + 1,
        dp[i-1][j-1] + (a[i-1] !== b[j-1] ? 1 : 0)
      );
  return dp[m][n];
}

// ── Tokenizer ──
function tokenize(text) {
  const re = /[A-Za-z\u2019']+(?:-[A-Za-z\u2019']+)*/g;
  const tokens = []; let m;
  while ((m = re.exec(text)) !== null)
    tokens.push({ text: m[0], start: m.index, end: m.index + m[0].length });
  return tokens;
}

function findConsecutive(text, phraseWords) {
  const tokens = tokenize(text);
  for (let i = 0; i <= tokens.length - phraseWords.length; i++) {
    let ok = true;
    for (let j = 0; j < phraseWords.length; j++)
      if (tokens[i+j].text.toLowerCase() !== phraseWords[j]) { ok = false; break; }
    if (ok) return { start: tokens[i].start, end: tokens[i + phraseWords.length - 1].end };
  }
  return null;
}

// ── Highlight logic ──
function highlightSentence(text, vocabList) {
  const ranges = [];
  const lower = text.toLowerCase();

  for (let vi = 0; vi < vocabList.length; vi++) {
    const v = vocabList[vi];
    const phrase = v.word.toLowerCase().replace(/\s*\(.*?\)\s*/g, '').trim();

    // 1) Exact substring
    const idx = lower.indexOf(phrase);
    if (idx !== -1) { ranges.push({ start: idx, end: idx + phrase.length, vi }); continue; }

    // 2) Multi-word consecutive
    const pw = phrase.split(/\s+/);
    if (pw.length > 1) {
      const found = findConsecutive(text, pw);
      if (found) { ranges.push({ ...found, vi }); continue; }
    }

    // 3) Fuzzy per token
    const tokens = tokenize(text);
    for (const w of pw) {
      let bestD = Infinity, bestT = null;
      const thresh = Math.max(2, Math.floor(w.length * 0.35));
      for (const t of tokens) {
        const d = lev(w, t.text.toLowerCase());
        if (d < bestD) { bestD = d; bestT = t; }
      }
      if (bestT && bestD <= thresh) ranges.push({ start: bestT.start, end: bestT.end, vi });
    }
  }

  // Merge overlapping (collect vocab indices)
  ranges.sort((a, b) => a.start - b.start);
  const merged = [];
  for (const r of ranges) {
    if (merged.length && r.start <= merged[merged.length-1].end) {
      merged[merged.length-1].end = Math.max(merged[merged.length-1].end, r.end);
      merged[merged.length-1].vis.add(r.vi);
    } else {
      merged.push({ start: r.start, end: r.end, vis: new Set([r.vi]) });
    }
  }

  let result = '', last = 0;
  for (const r of merged) {
    result += esc(text.slice(last, r.start));
    const idxs = [...r.vis].join(',');
    result += '<span class="hw" data-vocab="' + idxs + '">' + esc(text.slice(r.start, r.end)) + '</span>';
    last = r.end;
  }
  return result + esc(text.slice(last));
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Render ──
let cur = 0;
const total = DATA.sentences ? DATA.sentences.length : 0;

function render() {
  if (!total) { document.getElementById('content').innerHTML = '<p>데이터가 없습니다.</p>'; return; }
  const s = DATA.sentences[cur];
  const vocabHtml = s.vocabulary.map(v => `
    <div class="vocab-item">
      <div class="vocab-word">${esc(v.word)}</div>
      <div class="vocab-meaning">${esc(v.meaning)}</div>
      ${v.note ? `<div class="vocab-note">${esc(v.note)}</div>` : ''}
    </div>`).join('');

  document.getElementById('content').innerHTML = `
    <div class="section-label">원문</div>
    <div class="original-card">${highlightSentence(s.original, s.vocabulary)}</div>
    <div class="section-label">해설</div>
    <div class="explain-card">${esc(s.explanation)}</div>
    <div class="section-label">주요 단어</div>
    <div class="vocab-list">${vocabHtml}</div>`;

  const label = `${cur+1} / ${total}`;
  document.getElementById('progressLabel').textContent = label;
  document.getElementById('navIndicator').textContent = label;
  document.getElementById('progressFill').style.width = `${((cur+1)/total)*100}%`;
  document.getElementById('prevBtn').disabled = cur === 0;
  document.getElementById('nextBtn').disabled = !quizEnabled && cur === total - 1;
  document.getElementById('nextBtn').textContent = (quizEnabled && cur === total - 1) ? '결과 \u203A' : '다음 \u203A';
  document.getElementById('content').scrollTop = 0;
}

// ── Quiz Mode Toggle ──
let quizEnabled = true;

function toggleQuizMode() {
  quizEnabled = !quizEnabled;
  const btn = document.getElementById('quizToggle');
  btn.textContent = quizEnabled ? '퀴즈 ON' : '퀴즈 OFF';
  btn.classList.toggle('off', !quizEnabled);
  // Update next button text
  if (cur === total - 1) {
    document.getElementById('nextBtn').textContent = quizEnabled ? '결과 \u203A' : '다음 \u203A';
  }
}

// ── Quiz State ──
let quizActive = false;
let quizQueue = [];
let quizIdx = 0;
let quizAnswered = false;
const allWrongWords = []; // {word, meaning} across entire passage

// Collect all vocab from entire passage for distractor pool
function getAllVocab() {
  const all = [];
  for (const s of DATA.sentences) {
    if (s.vocabulary) {
      for (const v of s.vocabulary) all.push(v);
    }
  }
  return all;
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function makeChoices(q) {
  const allVocab = getAllVocab();
  const correct = q.isEn2Ko ? q.meaning : q.word;
  // Gather distractors from other vocab
  const pool = allVocab
    .map(v => q.isEn2Ko ? v.meaning : v.word)
    .filter(t => t !== correct);
  // Deduplicate
  const unique = [...new Set(pool)];
  shuffle(unique);
  const distractors = unique.slice(0, 3);
  // Combine and shuffle
  const choices = [correct, ...distractors];
  shuffle(choices);
  return { choices, correctIdx: choices.indexOf(correct) };
}

function go(dir) {
  if (quizActive) return;
  if (dir === -1 && cur === 0) return;

  // Going forward → show quiz for current sentence first
  if (dir === 1) {
    if (quizEnabled) {
      startQuiz();
    } else {
      if (cur < total - 1) { cur++; render(); }
    }
    return;
  }
  cur = cur + dir; render();
}

function startQuiz() {
  const s = DATA.sentences[cur];
  if (!s.vocabulary || s.vocabulary.length === 0) {
    if (cur === total - 1) { showWrongSummary(); return; }
    cur++; render();
    return;
  }

  quizQueue = s.vocabulary.map(v => {
    const isEn2Ko = Math.random() < 0.5;
    return { word: v.word, meaning: v.meaning, isEn2Ko };
  });
  shuffle(quizQueue);
  quizIdx = 0;
  quizActive = true;
  showQuizQuestion();
}

function showQuizQuestion() {
  quizAnswered = false;
  const q = quizQueue[quizIdx];
  const dirClass = q.isEn2Ko ? 'en2ko' : 'ko2en';
  const dirLabel = q.isEn2Ko ? 'English → 한국어' : '한국어 → English';
  const prompt = q.isEn2Ko ? q.word : q.meaning;
  const { choices, correctIdx } = makeChoices(q);

  const choicesHtml = choices.map((c, i) =>
    `<button class="quiz-choice" data-idx="${i}" data-correct="${i === correctIdx ? 1 : 0}" onclick="pickChoice(this)">${esc(c)}</button>`
  ).join('');

  const overlay = document.createElement('div');
  overlay.className = 'quiz-overlay';
  overlay.id = 'quizOverlay';
  overlay.innerHTML = `
    <div class="quiz-box">
      <div class="quiz-header">
        <span class="quiz-title">단어 퀴즈</span>
        <span class="quiz-progress">${quizIdx + 1} / ${quizQueue.length}</span>
      </div>
      <span class="quiz-direction ${dirClass}">${dirLabel}</span>
      <div class="quiz-prompt">${esc(prompt)}</div>
      <div class="quiz-choices">${choicesHtml}</div>
      <div id="quizFeedback"></div>
    </div>`;
  document.body.appendChild(overlay);
}

function pickChoice(btn) {
  if (quizAnswered) return;
  quizAnswered = true;
  const q = quizQueue[quizIdx];
  const isCorrect = btn.dataset.correct === '1';

  // Disable all buttons
  const allBtns = document.querySelectorAll('.quiz-choice');
  allBtns.forEach(b => {
    b.disabled = true;
    if (b.dataset.correct === '1') b.classList.add('reveal-correct');
  });

  if (isCorrect) {
    btn.classList.add('chosen-correct');
  } else {
    btn.classList.add('chosen-wrong');
    allWrongWords.push({ word: q.word, meaning: q.meaning });
  }

  const fb = document.getElementById('quizFeedback');
  const label = quizIdx < quizQueue.length - 1 ? '다음 문제' : '완료';
  if (isCorrect) {
    fb.innerHTML = `<div class="quiz-feedback correct">정답!</div>
      <button class="quiz-next-btn" onclick="advanceQuiz()">${label}</button>`;
  } else {
    const correctFull = q.isEn2Ko ? q.meaning : q.word;
    fb.innerHTML = `<div class="quiz-feedback wrong">오답! 정답: <span class="fb-answer">${esc(correctFull)}</span></div>
      <button class="quiz-next-btn" onclick="advanceQuiz()">${label}</button>`;
  }
}

function advanceQuiz() {
  const overlay = document.getElementById('quizOverlay');
  if (overlay) overlay.remove();

  quizIdx++;
  if (quizIdx < quizQueue.length) {
    showQuizQuestion();
    return;
  }

  // Quiz done for this sentence
  quizActive = false;
  const isLast = cur === total - 1;

  if (isLast) {
    // Show wrong words summary after last sentence
    showWrongSummary();
  } else {
    cur++;
    render();
  }
}

function showWrongSummary() {
  const overlay = document.createElement('div');
  overlay.className = 'wrong-summary-overlay';

  let inner = '';
  if (allWrongWords.length === 0) {
    inner = `<div class="wrong-summary-perfect">모든 단어를 맞혔습니다!</div>`;
  } else {
    inner = `<div class="wrong-summary-title">틀린 단어 (${allWrongWords.length}개)</div>`;
    // Deduplicate
    const seen = new Set();
    for (const w of allWrongWords) {
      const key = w.word + '|' + w.meaning;
      if (seen.has(key)) continue;
      seen.add(key);
      inner += `<div class="wrong-item"><div class="wi-word">${esc(w.word)}</div><div class="wi-meaning">${esc(w.meaning)}</div></div>`;
    }
  }
  inner += `<button class="wrong-close-btn" onclick="this.closest('.wrong-summary-overlay').remove()">닫기</button>`;

  overlay.innerHTML = `<div class="wrong-summary-box">${inner}</div>`;
  document.body.appendChild(overlay);
}

// Keyboard
document.addEventListener('keydown', e => {
  if (quizActive) return;
  if (e.key === 'ArrowLeft') go(-1);
  if (e.key === 'ArrowRight') go(1);
});
// Swipe
let sx = 0;
document.addEventListener('touchstart', e => { sx = e.touches[0].clientX; });
document.addEventListener('touchend', e => {
  if (quizActive) return;
  const d = e.changedTouches[0].clientX - sx;
  if (Math.abs(d) > 60) go(d < 0 ? 1 : -1);
});

// ── Tooltip ──
function hideTooltip() {
  document.querySelectorAll('.vocab-tooltip, .tooltip-overlay').forEach(el => el.remove());
}

function showTooltip(hwEl) {
  hideTooltip();
  const s = DATA.sentences[cur];
  const idxs = hwEl.dataset.vocab.split(',').map(Number);
  const vocabs = idxs.map(i => s.vocabulary[i]).filter(Boolean);
  if (!vocabs.length) return;

  // Build tooltip content
  const inner = vocabs.map((v, i) =>
    (i > 0 ? '<hr class="tt-sep">' : '') +
    '<div class="tt-word">' + esc(v.word) + '</div>' +
    '<div class="tt-meaning">' + esc(v.meaning) + '</div>' +
    (v.note ? '<div class="tt-note">' + esc(v.note) + '</div>' : '')
  ).join('');

  // Overlay to catch outside clicks
  const overlay = document.createElement('div');
  overlay.className = 'tooltip-overlay';
  overlay.addEventListener('click', hideTooltip);
  document.body.appendChild(overlay);

  // Tooltip element
  const tip = document.createElement('div');
  tip.className = 'vocab-tooltip';
  tip.innerHTML = inner;
  document.body.appendChild(tip);

  // Position
  const rect = hwEl.getBoundingClientRect();
  const tipH = tip.offsetHeight;
  const tipW = tip.offsetWidth;
  const spaceAbove = rect.top;
  const showAbove = spaceAbove > tipH + 16;

  let top, leftPos;
  if (showAbove) {
    top = rect.top + window.scrollY - tipH - 10;
    tip.classList.add('above');
  } else {
    top = rect.bottom + window.scrollY + 10;
    tip.classList.add('below');
  }
  leftPos = rect.left + window.scrollX + rect.width / 2 - tipW / 2;
  leftPos = Math.max(8, Math.min(leftPos, window.innerWidth - tipW - 8));

  tip.style.top = top + 'px';
  tip.style.left = leftPos + 'px';
}

document.addEventListener('click', e => {
  const hw = e.target.closest('.hw');
  if (hw && hw.dataset.vocab) { e.stopPropagation(); showTooltip(hw); }
});

// Init
if (DATA.title) document.getElementById('pageTitle').textContent = DATA.title;
render();
</script>
