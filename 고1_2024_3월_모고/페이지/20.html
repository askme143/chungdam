<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>문장별 해설 뷰어</title>
<style>
  :root {
    --bg: #f8f7f4;
    --card: #ffffff;
    --accent: #2563eb;
    --accent-light: #dbeafe;
    --highlight: #fef08a;
    --highlight-border: #eab308;
    --text: #1e293b;
    --text-sub: #64748b;
    --border: #e2e8f0;
    --vocab-bg: #f1f5f9;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                 "Noto Sans KR", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    position: relative;
    text-align: center;
    padding: 1.5rem 1rem 1rem;
    border-bottom: 1px solid var(--border);
    background: var(--card);
  }
  .home-btn {
    position: absolute;
    left: 1rem;
    top: 50%;
    transform: translateY(-50%);
    display: inline-flex;
    align-items: center;
    gap: 0.3rem;
    padding: 0.4rem 0.8rem;
    background: var(--accent-light);
    color: var(--accent);
    text-decoration: none;
    border-radius: 8px;
    font-size: 0.85rem;
    font-weight: 600;
    transition: background 0.15s, color 0.15s;
  }
  .home-btn:hover {
    background: var(--accent);
    color: #fff;
  }
  header h1 {
    font-size: 1.1rem;
    font-weight: 700;
    word-break: keep-all;
  }
  .progress-row {
    margin-top: .6rem;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: .5rem;
    font-size: .85rem;
    color: var(--text-sub);
  }
  .progress-bar {
    width: 120px; height: 5px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 3px;
    transition: width .3s;
  }

  /* ── Main ── */
  main {
    flex: 1;
    overflow-y: auto;
    padding: 1.25rem 1rem 7rem;
    max-width: 640px;
    width: 100%;
    margin: 0 auto;
  }

  .section-label {
    font-size: .75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .05em;
    color: var(--accent);
    margin-bottom: .5rem;
  }

  /* Original sentence */
  .original-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem;
    font-size: 1.08rem;
    line-height: 1.75;
    margin-bottom: 1.25rem;
    word-break: keep-all;
  }
  .original-card .hw {
    background: var(--highlight);
    border-bottom: 2px solid var(--highlight-border);
    border-radius: 3px;
    padding: 0 1px;
    cursor: pointer;
    transition: background .15s;
  }
  .original-card .hw:hover {
    background: #fde047;
  }

  /* ── Tooltip ── */
  .tooltip-overlay {
    position: fixed;
    inset: 0;
    z-index: 99;
  }
  .vocab-tooltip {
    position: absolute;
    z-index: 100;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: .9rem 1rem;
    box-shadow: 0 4px 20px rgba(0,0,0,.12);
    max-width: 320px;
    width: max-content;
    animation: tooltipIn .15s ease;
  }
  .vocab-tooltip::after {
    content: '';
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    border: 8px solid transparent;
  }
  .vocab-tooltip.above::after {
    top: 100%;
    border-top-color: var(--card);
  }
  .vocab-tooltip.below::after {
    bottom: 100%;
    border-bottom-color: var(--card);
  }
  .vocab-tooltip .tt-word {
    font-weight: 700;
    color: var(--accent);
    font-size: .95rem;
    margin-bottom: .2rem;
  }
  .vocab-tooltip .tt-meaning {
    font-size: .9rem;
    line-height: 1.5;
  }
  .vocab-tooltip .tt-note {
    font-size: .8rem;
    color: var(--text-sub);
    margin-top: .15rem;
    line-height: 1.4;
  }
  .vocab-tooltip .tt-sep {
    border: none;
    border-top: 1px solid var(--border);
    margin: .5rem 0;
  }
  @keyframes tooltipIn {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Explanation */
  .explain-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem;
    font-size: .97rem;
    line-height: 1.8;
    margin-bottom: 1.25rem;
    color: var(--text);
  }

  /* Vocabulary */
  .vocab-list {
    display: flex;
    flex-direction: column;
    gap: .6rem;
  }
  .vocab-item {
    background: var(--vocab-bg);
    border-radius: 10px;
    padding: 1rem 1.1rem;
  }
  .vocab-word {
    font-weight: 700;
    font-size: 1rem;
    color: var(--accent);
  }
  .vocab-meaning {
    margin-top: .25rem;
    font-size: .93rem;
  }
  .vocab-note {
    margin-top: .2rem;
    font-size: .82rem;
    color: var(--text-sub);
  }

  /* ── Bottom Nav ── */
  .bottom-nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--card);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: .75rem 1rem;
    padding-bottom: max(.75rem, env(safe-area-inset-bottom));
    z-index: 10;
  }
  .nav-btn {
    display: flex;
    align-items: center;
    gap: .35rem;
    background: none;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: .6rem 1.1rem;
    font-size: .95rem;
    font-weight: 600;
    color: var(--text);
    cursor: pointer;
    transition: all .15s;
    min-width: 5.5rem;
    justify-content: center;
  }
  .nav-btn:active { transform: scale(.96); }
  .nav-btn:not(:disabled):hover {
    border-color: var(--accent);
    color: var(--accent);
  }
  .nav-btn:disabled { opacity: .3; cursor: default; }
  .nav-indicator {
    font-size: .85rem;
    font-weight: 600;
    color: var(--text-sub);
    min-width: 3rem;
    text-align: center;
  }

  /* Animation */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  main > * { animation: fadeIn .3s ease; }

  /* ── Quiz Modal ── */
  .quiz-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.45);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    animation: fadeIn .2s ease;
  }
  .quiz-box {
    background: var(--card);
    border-radius: 16px;
    padding: 1.5rem;
    max-width: 420px;
    width: 100%;
    box-shadow: 0 8px 32px rgba(0,0,0,.18);
    animation: fadeIn .25s ease;
  }
  .quiz-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1rem;
  }
  .quiz-title {
    font-size: 1rem;
    font-weight: 700;
    color: var(--accent);
  }
  .quiz-progress {
    font-size: .82rem;
    color: var(--text-sub);
    font-weight: 600;
  }
  .quiz-direction {
    display: inline-block;
    font-size: .72rem;
    font-weight: 600;
    padding: .2rem .55rem;
    border-radius: 6px;
    margin-bottom: .6rem;
  }
  .quiz-direction.en2ko {
    background: #dbeafe;
    color: #1d4ed8;
  }
  .quiz-direction.ko2en {
    background: #fef3c7;
    color: #92400e;
  }
  .quiz-prompt {
    font-size: 1.15rem;
    font-weight: 700;
    margin-bottom: 1rem;
    line-height: 1.5;
    word-break: keep-all;
  }
  .quiz-choices {
    display: flex;
    flex-direction: column;
    gap: .5rem;
  }
  .quiz-choice {
    width: 100%;
    text-align: left;
    background: var(--vocab-bg);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: .7rem 1rem;
    font-size: .95rem;
    font-family: inherit;
    color: var(--text);
    cursor: pointer;
    transition: all .15s;
    line-height: 1.4;
    word-break: keep-all;
  }
  .quiz-choice:hover:not(:disabled) {
    border-color: var(--accent);
    background: var(--accent-light);
  }
  .quiz-choice:disabled {
    cursor: default;
  }
  .quiz-choice.chosen-correct {
    background: #dcfce7;
    border-color: #22c55e;
    color: #166534;
    font-weight: 600;
  }
  .quiz-choice.chosen-wrong {
    background: #fef2f2;
    border-color: #ef4444;
    color: #991b1b;
  }
  .quiz-choice.reveal-correct {
    background: #dcfce7;
    border-color: #22c55e;
    color: #166534;
    font-weight: 600;
  }
  .quiz-feedback {
    margin-top: .8rem;
    padding: .75rem 1rem;
    border-radius: 10px;
    font-size: .93rem;
    line-height: 1.5;
    animation: fadeIn .2s ease;
  }
  .quiz-feedback.correct {
    background: #dcfce7;
    color: #166534;
    border: 1px solid #bbf7d0;
  }
  .quiz-feedback.wrong {
    background: #fef2f2;
    color: #991b1b;
    border: 1px solid #fecaca;
  }
  .quiz-feedback .fb-answer {
    font-weight: 700;
  }
  .quiz-next-btn {
    margin-top: .8rem;
    width: 100%;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: .7rem;
    font-size: .95rem;
    font-weight: 600;
    cursor: pointer;
    transition: background .15s;
  }
  .quiz-next-btn:hover {
    background: #1d4ed8;
  }

  /* ── Wrong Words Summary ── */
  .wrong-summary-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.45);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    animation: fadeIn .2s ease;
  }
  .wrong-summary-box {
    background: var(--card);
    border-radius: 16px;
    padding: 1.5rem;
    max-width: 480px;
    width: 100%;
    max-height: 80vh;
    overflow-y: auto;
    box-shadow: 0 8px 32px rgba(0,0,0,.18);
    animation: fadeIn .25s ease;
  }
  .wrong-summary-title {
    font-size: 1.05rem;
    font-weight: 700;
    color: #991b1b;
    margin-bottom: 1rem;
    text-align: center;
  }
  .wrong-summary-perfect {
    font-size: 1.05rem;
    font-weight: 700;
    color: #166534;
    margin-bottom: 1rem;
    text-align: center;
  }
  .wrong-item {
    background: #fef2f2;
    border: 1px solid #fecaca;
    border-radius: 10px;
    padding: .8rem 1rem;
    margin-bottom: .5rem;
  }
  .wrong-item .wi-word {
    font-weight: 700;
    color: #1d4ed8;
    font-size: .95rem;
  }
  .wrong-item .wi-meaning {
    font-size: .9rem;
    color: var(--text);
    margin-top: .15rem;
  }
  .wrong-close-btn {
    margin-top: 1rem;
    width: 100%;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: .7rem;
    font-size: .95rem;
    font-weight: 600;
    cursor: pointer;
  }
</style>
</head>
<body>

<header>
  <a class="home-btn" href="../../">&#8592; 홈</a>
  <h1 id="pageTitle">문장별 해설</h1>
  <div class="progress-row">
    <span id="progressLabel">1 / ?</span>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  </div>
</header>

<main id="content"></main>

<nav class="bottom-nav">
  <button class="nav-btn" id="prevBtn" onclick="go(-1)">&#8249; 이전</button>
  <span class="nav-indicator" id="navIndicator">1 / ?</span>
  <button class="nav-btn" id="nextBtn" onclick="go(1)">다음 &#8250;</button>
</nav>

<script>
// ── DATA (injected by generate_html) ──
const DATA = {"title": "긍정 문장으로 만드는 삶의 변화", "summary": "현재의 어려움을 긍정적인 문장으로 바꿔 적으면 생각과 행동이 달라지고 자신감과 긍정성이 커질 수 있다는 내용이다.", "sentences": [{"id": 1, "original": "Magic is what we all wish for to happen in our life.", "explanation": "마법 같은 일은 우리 모두가 인생에서 일어나기를 바라는 것이다.", "vocabulary": [{"word": "magic", "meaning": "마법, 마법 같은 힘", "note": "여기서는 실제 마술이 아니라 놀라운 변화나 기적 같은 일을 비유적으로 뜻함."}, {"word": "wish for", "meaning": "~을 바라다, 소망하다", "note": "wish보다 더 구체적으로 어떤 것을 원한다는 느낌이 있음."}]}, {"id": 2, "original": "Do you love the movie Cinderella like me?", "explanation": "여러분도 나처럼 영화 「신데렐라」를 좋아하나요?", "vocabulary": [{"word": "Cinderella", "meaning": "신데렐라", "note": "동화 및 영화 제목으로 자주 쓰이는 고유명사."}, {"word": "like me", "meaning": "나처럼", "note": "상대에게 공감을 유도할 때 자주 쓰는 표현."}]}, {"id": 3, "original": "Well, in real life, you can also create magic.", "explanation": "그런데 현실에서도 여러분은 그런 마법 같은 변화를 만들어 낼 수 있다.", "vocabulary": [{"word": "in real life", "meaning": "현실에서, 실제 삶에서", "note": "영화나 상상 속 세계와 대비되는 표현."}, {"word": "create magic", "meaning": "마법 같은 변화를 만들어 내다", "note": "비유적 표현으로, 긍정적이고 놀라운 결과를 만들어 낸다는 뜻."}]}, {"id": 4, "original": "Here’s the trick.", "explanation": "그 비결은 바로 이것이다.", "vocabulary": [{"word": "trick", "meaning": "요령, 비결", "note": "속임수라는 뜻도 있지만 여기서는 문제를 푸는 간단한 방법이라는 의미."}]}, {"id": 5, "original": "Write down all the real­time challenges that you face and deal with.", "explanation": "지금 실제로 여러분이 마주하고 해결해 나가고 있는 어려움들을 모두 적어 보라.", "vocabulary": [{"word": "write down", "meaning": "적다, 기록하다", "note": "머릿속으로만 생각하지 말고 글로 써 두라는 뜻."}, {"word": "real-time challenges", "meaning": "현재 진행 중인 어려움들", "note": "지금 이 순간 실제로 겪고 있는 문제라는 의미."}, {"word": "deal with", "meaning": "대처하다, 처리하다", "note": "문제나 상황을 해결하려고 맞서는 표현."}]}, {"id": 6, "original": "Just change the challenge statement into positive statements.", "explanation": "그 어려움을 표현한 문장을 긍정적인 문장으로 바꾸기만 하면 된다.", "vocabulary": [{"word": "challenge statement", "meaning": "어려움을 나타내는 문장", "note": "자신의 문제 상황을 서술한 문장을 뜻함."}, {"word": "positive statements", "meaning": "긍정적인 문장들", "note": "원하는 상태나 바람직한 모습을 긍정형으로 표현한 문장."}, {"word": "change A into B", "meaning": "A를 B로 바꾸다", "note": "형태나 성격의 변화를 나타내는 기본 표현."}]}, {"id": 7, "original": "Let me give you an example here.", "explanation": "여기서 한 가지 예를 들어 보겠다.", "vocabulary": [{"word": "give you an example", "meaning": "예를 들다", "note": "설명을 쉽게 하기 위해 사례를 제시할 때 쓰는 표현."}]}, {"id": 8, "original": "If you struggle with getting up early in the morning, then write a positive statement such as “I get up early in the morning at 5:00 am every day.”", "explanation": "만약 아침에 일찍 일어나는 것이 힘들다면, ‘나는 매일 아침 5시에 일찍 일어난다’와 같은 긍정적인 문장을 적으라는 뜻이다.", "vocabulary": [{"word": "struggle with", "meaning": "~로 힘들어하다, ~에 어려움을 겪다", "note": "어떤 문제 때문에 애를 먹는 상황을 나타냄."}, {"word": "getting up early", "meaning": "일찍 일어나는 것", "note": "동명사 형태로 행동 자체를 가리킴."}, {"word": "such as", "meaning": "예를 들면", "note": "구체적인 예시를 제시할 때 쓰는 표현."}, {"word": "positive statement", "meaning": "긍정적인 문장", "note": "부정적 문제 진술 대신 원하는 상태를 확신 있게 표현한 문장."}]}, {"id": 9, "original": "Once you write these statements, get ready to witness magic and confidence.", "explanation": "이런 문장들을 쓰고 나면, 마법 같은 변화와 자신감이 나타나는 것을 보게 될 준비를 하라는 말이다.", "vocabulary": [{"word": "once", "meaning": "~하고 나면, 일단 ~하면", "note": "시간의 선후 관계를 나타냄."}, {"word": "get ready to", "meaning": "~할 준비를 하다", "note": "곧 어떤 일이 일어날 것임을 암시하는 표현."}, {"word": "witness", "meaning": "목격하다, 직접 보다", "note": "변화를 실제로 경험하거나 확인한다는 느낌이 있음."}, {"word": "confidence", "meaning": "자신감", "note": "자기 자신에 대한 믿음."}]}, {"id": 10, "original": "You will be surprised that just by writing these statements, there is a shift in the way you think and act.", "explanation": "이 문장들을 쓰기만 해도 생각하는 방식과 행동하는 방식에 변화가 생긴다는 사실에 놀라게 될 것이다.", "vocabulary": [{"word": "just by", "meaning": "단지 ~함으로써", "note": "아주 간단한 행동만으로 결과가 생김을 강조함."}, {"word": "there is a shift", "meaning": "변화가 있다, 전환이 일어나다", "note": "shift는 작지만 중요한 방향 전환이나 변화라는 느낌."}, {"word": "the way you think and act", "meaning": "생각하고 행동하는 방식", "note": "사고방식과 행동양식을 함께 가리키는 표현."}]}, {"id": 11, "original": "Suddenly you feel more powerful and positive", "explanation": "그러면 어느 순간 자신이 더 힘이 있고 더 긍정적으로 느껴지게 된다.", "vocabulary": [{"word": "suddenly", "meaning": "갑자기, 어느 순간", "note": "변화가 빠르게 체감됨을 나타냄."}, {"word": "powerful", "meaning": "힘이 있는, 강한", "note": "여기서는 신체적 힘보다 내적인 힘과 자신감을 뜻함."}, {"word": "positive", "meaning": "긍정적인", "note": "태도나 마음가짐이 밝고 희망적인 상태를 의미함."}]}]};

// ── Levenshtein distance ──
function lev(a, b) {
  const m = a.length, n = b.length;
  const dp = Array.from({ length: m + 1 }, () => Array(n + 1).fill(0));
  for (let i = 0; i <= m; i++) dp[i][0] = i;
  for (let j = 0; j <= n; j++) dp[0][j] = j;
  for (let i = 1; i <= m; i++)
    for (let j = 1; j <= n; j++)
      dp[i][j] = Math.min(
        dp[i-1][j] + 1,
        dp[i][j-1] + 1,
        dp[i-1][j-1] + (a[i-1] !== b[j-1] ? 1 : 0)
      );
  return dp[m][n];
}

// ── Tokenizer ──
function tokenize(text) {
  const re = /[A-Za-z\u2019']+(?:-[A-Za-z\u2019']+)*/g;
  const tokens = []; let m;
  while ((m = re.exec(text)) !== null)
    tokens.push({ text: m[0], start: m.index, end: m.index + m[0].length });
  return tokens;
}

function findConsecutive(text, phraseWords) {
  const tokens = tokenize(text);
  for (let i = 0; i <= tokens.length - phraseWords.length; i++) {
    let ok = true;
    for (let j = 0; j < phraseWords.length; j++)
      if (tokens[i+j].text.toLowerCase() !== phraseWords[j]) { ok = false; break; }
    if (ok) return { start: tokens[i].start, end: tokens[i + phraseWords.length - 1].end };
  }
  return null;
}

// ── Highlight logic ──
function highlightSentence(text, vocabList) {
  const ranges = [];
  const lower = text.toLowerCase();

  for (let vi = 0; vi < vocabList.length; vi++) {
    const v = vocabList[vi];
    const phrase = v.word.toLowerCase().replace(/\s*\(.*?\)\s*/g, '').trim();

    // 1) Exact substring
    const idx = lower.indexOf(phrase);
    if (idx !== -1) { ranges.push({ start: idx, end: idx + phrase.length, vi }); continue; }

    // 2) Multi-word consecutive
    const pw = phrase.split(/\s+/);
    if (pw.length > 1) {
      const found = findConsecutive(text, pw);
      if (found) { ranges.push({ ...found, vi }); continue; }
    }

    // 3) Fuzzy per token
    const tokens = tokenize(text);
    for (const w of pw) {
      let bestD = Infinity, bestT = null;
      const thresh = Math.max(2, Math.floor(w.length * 0.35));
      for (const t of tokens) {
        const d = lev(w, t.text.toLowerCase());
        if (d < bestD) { bestD = d; bestT = t; }
      }
      if (bestT && bestD <= thresh) ranges.push({ start: bestT.start, end: bestT.end, vi });
    }
  }

  // Merge overlapping (collect vocab indices)
  ranges.sort((a, b) => a.start - b.start);
  const merged = [];
  for (const r of ranges) {
    if (merged.length && r.start <= merged[merged.length-1].end) {
      merged[merged.length-1].end = Math.max(merged[merged.length-1].end, r.end);
      merged[merged.length-1].vis.add(r.vi);
    } else {
      merged.push({ start: r.start, end: r.end, vis: new Set([r.vi]) });
    }
  }

  let result = '', last = 0;
  for (const r of merged) {
    result += esc(text.slice(last, r.start));
    const idxs = [...r.vis].join(',');
    result += '<span class="hw" data-vocab="' + idxs + '">' + esc(text.slice(r.start, r.end)) + '</span>';
    last = r.end;
  }
  return result + esc(text.slice(last));
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Render ──
let cur = 0;
const total = DATA.sentences ? DATA.sentences.length : 0;

function render() {
  if (!total) { document.getElementById('content').innerHTML = '<p>데이터가 없습니다.</p>'; return; }
  const s = DATA.sentences[cur];
  const vocabHtml = s.vocabulary.map(v => `
    <div class="vocab-item">
      <div class="vocab-word">${esc(v.word)}</div>
      <div class="vocab-meaning">${esc(v.meaning)}</div>
      ${v.note ? `<div class="vocab-note">${esc(v.note)}</div>` : ''}
    </div>`).join('');

  document.getElementById('content').innerHTML = `
    <div class="section-label">원문</div>
    <div class="original-card">${highlightSentence(s.original, s.vocabulary)}</div>
    <div class="section-label">해설</div>
    <div class="explain-card">${esc(s.explanation)}</div>
    <div class="section-label">주요 단어</div>
    <div class="vocab-list">${vocabHtml}</div>`;

  const label = `${cur+1} / ${total}`;
  document.getElementById('progressLabel').textContent = label;
  document.getElementById('navIndicator').textContent = label;
  document.getElementById('progressFill').style.width = `${((cur+1)/total)*100}%`;
  document.getElementById('prevBtn').disabled = cur === 0;
  document.getElementById('nextBtn').disabled = false;
  document.getElementById('nextBtn').textContent = cur === total - 1 ? '결과 \u203A' : '다음 \u203A';
  document.getElementById('content').scrollTop = 0;
}

// ── Quiz State ──
let quizActive = false;
let quizQueue = [];
let quizIdx = 0;
let quizAnswered = false;
const allWrongWords = []; // {word, meaning} across entire passage

// Collect all vocab from entire passage for distractor pool
function getAllVocab() {
  const all = [];
  for (const s of DATA.sentences) {
    if (s.vocabulary) {
      for (const v of s.vocabulary) all.push(v);
    }
  }
  return all;
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function makeChoices(q) {
  const allVocab = getAllVocab();
  const correct = q.isEn2Ko ? q.meaning : q.word;
  // Gather distractors from other vocab
  const pool = allVocab
    .map(v => q.isEn2Ko ? v.meaning : v.word)
    .filter(t => t !== correct);
  // Deduplicate
  const unique = [...new Set(pool)];
  shuffle(unique);
  const distractors = unique.slice(0, 3);
  // Combine and shuffle
  const choices = [correct, ...distractors];
  shuffle(choices);
  return { choices, correctIdx: choices.indexOf(correct) };
}

function go(dir) {
  if (quizActive) return;
  if (dir === -1 && cur === 0) return;

  // Going forward → show quiz for current sentence first
  if (dir === 1) {
    startQuiz();
    return;
  }
  cur = cur + dir; render();
}

function startQuiz() {
  const s = DATA.sentences[cur];
  if (!s.vocabulary || s.vocabulary.length === 0) {
    if (cur === total - 1) { showWrongSummary(); return; }
    cur++; render();
    return;
  }

  quizQueue = s.vocabulary.map(v => {
    const isEn2Ko = Math.random() < 0.5;
    return { word: v.word, meaning: v.meaning, isEn2Ko };
  });
  shuffle(quizQueue);
  quizIdx = 0;
  quizActive = true;
  showQuizQuestion();
}

function showQuizQuestion() {
  quizAnswered = false;
  const q = quizQueue[quizIdx];
  const dirClass = q.isEn2Ko ? 'en2ko' : 'ko2en';
  const dirLabel = q.isEn2Ko ? 'English → 한국어' : '한국어 → English';
  const prompt = q.isEn2Ko ? q.word : q.meaning;
  const { choices, correctIdx } = makeChoices(q);

  const choicesHtml = choices.map((c, i) =>
    `<button class="quiz-choice" data-idx="${i}" data-correct="${i === correctIdx ? 1 : 0}" onclick="pickChoice(this)">${esc(c)}</button>`
  ).join('');

  const overlay = document.createElement('div');
  overlay.className = 'quiz-overlay';
  overlay.id = 'quizOverlay';
  overlay.innerHTML = `
    <div class="quiz-box">
      <div class="quiz-header">
        <span class="quiz-title">단어 퀴즈</span>
        <span class="quiz-progress">${quizIdx + 1} / ${quizQueue.length}</span>
      </div>
      <span class="quiz-direction ${dirClass}">${dirLabel}</span>
      <div class="quiz-prompt">${esc(prompt)}</div>
      <div class="quiz-choices">${choicesHtml}</div>
      <div id="quizFeedback"></div>
    </div>`;
  document.body.appendChild(overlay);
}

function pickChoice(btn) {
  if (quizAnswered) return;
  quizAnswered = true;
  const q = quizQueue[quizIdx];
  const isCorrect = btn.dataset.correct === '1';

  // Disable all buttons
  const allBtns = document.querySelectorAll('.quiz-choice');
  allBtns.forEach(b => {
    b.disabled = true;
    if (b.dataset.correct === '1') b.classList.add('reveal-correct');
  });

  if (isCorrect) {
    btn.classList.add('chosen-correct');
  } else {
    btn.classList.add('chosen-wrong');
    allWrongWords.push({ word: q.word, meaning: q.meaning });
  }

  const fb = document.getElementById('quizFeedback');
  const label = quizIdx < quizQueue.length - 1 ? '다음 문제' : '완료';
  if (isCorrect) {
    fb.innerHTML = `<div class="quiz-feedback correct">정답!</div>
      <button class="quiz-next-btn" onclick="advanceQuiz()">${label}</button>`;
  } else {
    const correctFull = q.isEn2Ko ? q.meaning : q.word;
    fb.innerHTML = `<div class="quiz-feedback wrong">오답! 정답: <span class="fb-answer">${esc(correctFull)}</span></div>
      <button class="quiz-next-btn" onclick="advanceQuiz()">${label}</button>`;
  }
}

function advanceQuiz() {
  const overlay = document.getElementById('quizOverlay');
  if (overlay) overlay.remove();

  quizIdx++;
  if (quizIdx < quizQueue.length) {
    showQuizQuestion();
    return;
  }

  // Quiz done for this sentence
  quizActive = false;
  const isLast = cur === total - 1;

  if (isLast) {
    // Show wrong words summary after last sentence
    showWrongSummary();
  } else {
    cur++;
    render();
  }
}

function showWrongSummary() {
  const overlay = document.createElement('div');
  overlay.className = 'wrong-summary-overlay';

  let inner = '';
  if (allWrongWords.length === 0) {
    inner = `<div class="wrong-summary-perfect">모든 단어를 맞혔습니다!</div>`;
  } else {
    inner = `<div class="wrong-summary-title">틀린 단어 (${allWrongWords.length}개)</div>`;
    // Deduplicate
    const seen = new Set();
    for (const w of allWrongWords) {
      const key = w.word + '|' + w.meaning;
      if (seen.has(key)) continue;
      seen.add(key);
      inner += `<div class="wrong-item"><div class="wi-word">${esc(w.word)}</div><div class="wi-meaning">${esc(w.meaning)}</div></div>`;
    }
  }
  inner += `<button class="wrong-close-btn" onclick="this.closest('.wrong-summary-overlay').remove()">닫기</button>`;

  overlay.innerHTML = `<div class="wrong-summary-box">${inner}</div>`;
  document.body.appendChild(overlay);
}

// Keyboard
document.addEventListener('keydown', e => {
  if (quizActive) return;
  if (e.key === 'ArrowLeft') go(-1);
  if (e.key === 'ArrowRight') go(1);
});
// Swipe
let sx = 0;
document.addEventListener('touchstart', e => { sx = e.touches[0].clientX; });
document.addEventListener('touchend', e => {
  if (quizActive) return;
  const d = e.changedTouches[0].clientX - sx;
  if (Math.abs(d) > 60) go(d < 0 ? 1 : -1);
});

// ── Tooltip ──
function hideTooltip() {
  document.querySelectorAll('.vocab-tooltip, .tooltip-overlay').forEach(el => el.remove());
}

function showTooltip(hwEl) {
  hideTooltip();
  const s = DATA.sentences[cur];
  const idxs = hwEl.dataset.vocab.split(',').map(Number);
  const vocabs = idxs.map(i => s.vocabulary[i]).filter(Boolean);
  if (!vocabs.length) return;

  // Build tooltip content
  const inner = vocabs.map((v, i) =>
    (i > 0 ? '<hr class="tt-sep">' : '') +
    '<div class="tt-word">' + esc(v.word) + '</div>' +
    '<div class="tt-meaning">' + esc(v.meaning) + '</div>' +
    (v.note ? '<div class="tt-note">' + esc(v.note) + '</div>' : '')
  ).join('');

  // Overlay to catch outside clicks
  const overlay = document.createElement('div');
  overlay.className = 'tooltip-overlay';
  overlay.addEventListener('click', hideTooltip);
  document.body.appendChild(overlay);

  // Tooltip element
  const tip = document.createElement('div');
  tip.className = 'vocab-tooltip';
  tip.innerHTML = inner;
  document.body.appendChild(tip);

  // Position
  const rect = hwEl.getBoundingClientRect();
  const tipH = tip.offsetHeight;
  const tipW = tip.offsetWidth;
  const spaceAbove = rect.top;
  const showAbove = spaceAbove > tipH + 16;

  let top, leftPos;
  if (showAbove) {
    top = rect.top + window.scrollY - tipH - 10;
    tip.classList.add('above');
  } else {
    top = rect.bottom + window.scrollY + 10;
    tip.classList.add('below');
  }
  leftPos = rect.left + window.scrollX + rect.width / 2 - tipW / 2;
  leftPos = Math.max(8, Math.min(leftPos, window.innerWidth - tipW - 8));

  tip.style.top = top + 'px';
  tip.style.left = leftPos + 'px';
}

document.addEventListener('click', e => {
  const hw = e.target.closest('.hw');
  if (hw && hw.dataset.vocab) { e.stopPropagation(); showTooltip(hw); }
});

// Init
if (DATA.title) document.getElementById('pageTitle').textContent = DATA.title;
render();
</script>
