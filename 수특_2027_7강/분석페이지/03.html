<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>본문분석</title>
<style>
  :root {
    --bg: #f8f7f4;
    --card: #ffffff;
    --accent: #2563eb;
    --accent-light: #dbeafe;
    --text: #1e293b;
    --text-sub: #64748b;
    --border: #e2e8f0;
    --red: #dc2626;
    --red-light: #fef2f2;
    --yellow: #eab308;
    --yellow-light: #fefce8;
    --green: #16a34a;
    --green-light: #f0fdf4;
    --blue: #2563eb;
    --blue-light: #dbeafe;
    --orange: #ea580c;
    --purple: #7c3aed;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                 "Noto Sans KR", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    line-height: 1.7;
  }

  /* ── Header ── */
  header {
    position: sticky;
    top: 0;
    z-index: 50;
    text-align: center;
    padding: 1rem;
    border-bottom: 1px solid var(--border);
    background: var(--card);
  }
  .header-top {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
  }
  .home-btn, .viewer-btn {
    display: inline-flex;
    align-items: center;
    gap: 0.3rem;
    padding: 0.4rem 0.8rem;
    background: var(--accent-light);
    color: var(--accent);
    text-decoration: none;
    border-radius: 8px;
    font-size: 0.82rem;
    font-weight: 600;
    transition: background 0.15s, color 0.15s;
    border: none;
    cursor: pointer;
    font-family: inherit;
  }
  .home-btn { position: absolute; left: 1rem; }
  .viewer-btn { position: absolute; right: 1rem; }
  .home-btn:hover, .viewer-btn:hover {
    background: var(--accent);
    color: #fff;
  }
  header h1 {
    font-size: 1.05rem;
    font-weight: 700;
    word-break: keep-all;
  }
  .header-sub {
    font-size: 0.78rem;
    color: var(--text-sub);
    margin-top: 0.2rem;
  }

  /* ── Main ── */
  main {
    max-width: 720px;
    width: 100%;
    margin: 0 auto;
    padding: 1.5rem 1rem 3rem;
  }

  /* ── Section Titles ── */
  .section-title {
    font-size: 1.3rem;
    font-weight: 800;
    margin: 2.5rem 0 0.3rem;
    display: flex;
    align-items: baseline;
    gap: 0.6rem;
  }
  .section-title:first-child { margin-top: 0; }
  .section-title .sub {
    font-size: 0.78rem;
    font-weight: 400;
    color: var(--text-sub);
  }

  /* ── Section 1: 지문 구조 ── */
  .structure-timeline {
    position: relative;
    padding-left: 2rem;
    margin: 1rem 0;
  }
  .structure-timeline::before {
    content: '';
    position: absolute;
    left: 0.55rem;
    top: 0.6rem;
    bottom: 0.6rem;
    width: 2px;
    border-left: 2px dashed var(--border);
  }
  .structure-item {
    position: relative;
    padding: 0.8rem 0 0.8rem 0;
    border-bottom: 1px solid var(--border);
  }
  .structure-item:last-child { border-bottom: none; }
  .structure-dot {
    position: absolute;
    left: -1.65rem;
    top: 1rem;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--accent);
    border: 2px solid var(--card);
    box-shadow: 0 0 0 2px var(--accent);
  }
  .structure-label {
    font-weight: 700;
    font-size: 0.9rem;
    margin-bottom: 0.3rem;
  }
  .structure-en {
    font-size: 0.95rem;
    line-height: 1.6;
  }
  .structure-ko {
    font-size: 0.85rem;
    color: var(--text-sub);
    margin-top: 0.15rem;
  }

  /* ── Section 2: 제목, 주제, 요약 ── */
  .meta-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.2rem;
    margin: 1rem 0;
  }
  .meta-row {
    display: flex;
    gap: 0.8rem;
    padding: 0.7rem 0;
    border-bottom: 1px solid var(--border);
    align-items: flex-start;
  }
  .meta-row:last-child { border-bottom: none; }
  .meta-label {
    flex-shrink: 0;
    display: inline-block;
    padding: 0.2rem 0.6rem;
    background: var(--accent);
    color: #fff;
    border-radius: 4px;
    font-size: 0.78rem;
    font-weight: 700;
    min-width: 3rem;
    text-align: center;
  }
  .meta-content { flex: 1; }
  .meta-en {
    font-size: 0.95rem;
    line-height: 1.6;
  }
  .meta-ko {
    font-size: 0.85rem;
    color: var(--text-sub);
    margin-top: 0.15rem;
  }

  /* ── Section 3: 핵심 단어 ── */
  .vocab-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    background: var(--card);
    margin: 1rem 0;
  }
  @media (max-width: 540px) {
    .vocab-grid { grid-template-columns: 1fr; }
  }
  .vocab-cell {
    padding: 0.8rem 1rem;
    border-bottom: 1px solid var(--border);
    border-right: 1px solid var(--border);
    display: flex;
    gap: 0.6rem;
    align-items: flex-start;
  }
  .vocab-cell:nth-child(2n) { border-right: none; }
  @media (max-width: 540px) {
    .vocab-cell { border-right: none; }
  }
  .vocab-cell:nth-last-child(-n+2) { border-bottom: none; }
  @media (max-width: 540px) {
    .vocab-cell:nth-last-child(-n+2) { border-bottom: 1px solid var(--border); }
    .vocab-cell:last-child { border-bottom: none; }
  }
  .vocab-cb {
    margin-top: 0.25rem;
    width: 16px;
    height: 16px;
    accent-color: var(--accent);
    cursor: pointer;
    flex-shrink: 0;
  }
  .vocab-info { flex: 1; }
  .vocab-word {
    font-weight: 700;
    font-size: 0.95rem;
  }
  .vocab-word .em-mark {
    color: var(--red);
    font-size: 0.8em;
  }
  .vocab-meaning {
    font-size: 0.85rem;
    color: var(--text-sub);
  }
  .vocab-syn {
    font-size: 0.8rem;
    color: var(--green);
  }
  .vocab-ant {
    font-size: 0.8rem;
    color: var(--red);
  }

  /* ── Section 4: 지문 읽기 ── */
  .passage-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
    margin: 1rem 0;
    font-size: 1.05rem;
    line-height: 2;
  }
  .sent-num {
    color: var(--accent);
    font-size: 0.75em;
    font-weight: 700;
    vertical-align: super;
    margin-right: 0.1em;
  }
  .passage-translations {
    border-top: 2px dashed var(--border);
    margin-top: 1rem;
    padding-top: 1rem;
    font-size: 0.88rem;
    color: var(--text-sub);
    line-height: 1.8;
  }
  .passage-translations .t-item {
    margin-bottom: 0.4rem;
  }
  .passage-translations .t-num {
    color: var(--accent);
    font-weight: 700;
    margin-right: 0.3rem;
  }

  /* ── Section 5: 문장별 분석 ── */
  .analysis-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
    margin: 1.5rem 0;
  }
  .analysis-header {
    display: flex;
    align-items: baseline;
    gap: 0.8rem;
    margin-bottom: 1rem;
  }
  .analysis-num {
    font-size: 1.6rem;
    font-weight: 800;
    color: var(--text);
    line-height: 1;
  }
  .analysis-type {
    font-size: 0.8rem;
    font-weight: 600;
    padding: 0.15rem 0.5rem;
    border-radius: 4px;
    color: var(--accent);
    background: var(--accent-light);
  }

  /* Legend */
  .legend-box {
    display: flex;
    flex-wrap: wrap;
    gap: 0.8rem;
    padding: 0.8rem 1rem;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin: 0.5rem 0 1rem;
    font-size: 0.85rem;
  }
  .legend-item {
    display: inline-flex;
    align-items: center;
    gap: 0.3rem;
  }

  /* Phrase rendering */
  .phrase-area {
    font-size: 1.05rem;
    line-height: 2.5;
    margin-bottom: 1rem;
    word-break: keep-all;
    overflow-wrap: break-word;
  }
  .phrase-unit {
    display: inline-block;
  }
  .phrase-core {
    position: relative;
    display: inline;
    line-height: normal;
  }
  .phrase-text {
    display: inline;
  }
  .phrase-bracket {
    font-size: 1.15em;
  }
  .phrase-bracket.depth-0 { color: var(--accent); }
  .phrase-bracket.depth-1 { color: var(--orange); }
  .phrase-bracket.depth-2 { color: var(--green); }
  .phrase-bracket.depth-3 { color: var(--purple); }
  .phrase-slash {
    color: var(--accent);
    font-weight: 700;
    margin: 0 0.2em;
  }
  .phrase-bold { font-weight: 700; }
  .phrase-underline {
    text-decoration: underline;
    text-decoration-color: var(--text);
    text-underline-offset: 3px;
  }
  .phrase-boxed {
    border: 1.5px solid var(--red);
    padding: 0 0.2em;
    border-radius: 3px;
  }
  .grammar-label {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    top: 100%;
    font-size: 0.68rem;
    color: var(--red);
    font-weight: 600;
    line-height: 1.2;
    text-align: center;
    white-space: nowrap;
    pointer-events: none;
  }
  .annot-above {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    bottom: 100%;
    font-size: 0.68rem;
    color: var(--red);
    font-weight: 400;
    line-height: 1.2;
    text-align: center;
    white-space: nowrap;
    pointer-events: none;
  }
  .annot-below {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    top: calc(100% + 1.1em);
    font-size: 0.68rem;
    color: var(--red);
    font-weight: 400;
    line-height: 1.2;
    text-align: center;
    white-space: nowrap;
    pointer-events: none;
  }

  /* Korean translation */
  .analysis-korean {
    font-size: 0.92rem;
    color: var(--text-sub);
    margin-bottom: 1rem;
    line-height: 1.7;
  }

  /* 포인트! */
  .point-box {
    background: var(--yellow-light);
    border: 1px solid var(--yellow);
    border-radius: 8px;
    padding: 0.8rem 1rem;
    margin-bottom: 1rem;
  }
  .point-title {
    font-weight: 700;
    font-size: 0.85rem;
    color: #92400e;
    margin-bottom: 0.3rem;
  }
  .point-item {
    font-size: 0.85rem;
    line-height: 1.6;
    color: #78350f;
  }
  .point-item::before {
    content: '• ';
  }

  /* 패러프레이징 */
  .paraphrase-box {
    border-top: 2px dashed var(--border);
    padding-top: 0.8rem;
  }
  .paraphrase-label {
    font-weight: 800;
    font-size: 0.85rem;
    margin-bottom: 0.3rem;
    color: var(--text);
    text-decoration: underline;
    text-underline-offset: 3px;
  }
  .paraphrase-en {
    font-size: 0.92rem;
    line-height: 1.6;
  }
  .paraphrase-ko {
    font-size: 0.85rem;
    color: var(--text-sub);
    margin-top: 0.15rem;
  }

  /* ── Toast ── */
  .toast-msg {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(10px);
    background: rgba(0,0,0,.8);
    color: #fff;
    padding: .6rem 1.2rem;
    border-radius: 8px;
    font-size: .85rem;
    opacity: 0;
    transition: opacity .3s, transform .3s;
    z-index: 200;
    pointer-events: none;
  }
  .toast-msg.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── Nav anchors ── */
  .nav-toc {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1rem 1.2rem;
    margin: 1rem 0 1.5rem;
  }
  .nav-toc-title {
    font-weight: 700;
    font-size: 0.85rem;
    color: var(--text-sub);
    margin-bottom: 0.5rem;
  }
  .nav-toc a {
    display: inline-block;
    padding: 0.3rem 0.7rem;
    margin: 0.15rem;
    background: var(--accent-light);
    color: var(--accent);
    text-decoration: none;
    border-radius: 6px;
    font-size: 0.82rem;
    font-weight: 600;
    transition: background 0.15s;
  }
  .nav-toc a:hover {
    background: var(--accent);
    color: #fff;
  }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <a class="home-btn" href="/chungdam/">&#x1F3E0; 홈</a>
    <div>
      <h1 id="pageTitle">본문분석</h1>
      <div class="header-sub" id="examInfo"></div>
    </div>
    <a class="viewer-btn" id="viewerLink" style="display:none">문장별 해설 &#x203A;</a>
  </div>
</header>

<main id="content">
</main>

<script>
const DATA = {"title_en": "How CAD Can Weaken Architectural Creativity", "title_ko": "CAD가 건축 창의성을 약하게 만들 수 있는 이유", "theme_en": "The passage argues that computer-based design can reduce architects’ creativity, exploration, and emotional connection compared with hand sketching.", "theme_ko": "이 글은 컴퓨터로 하는 설계가 손그림보다 건축가의 창의성, 탐색 과정, 감정적 연결을 줄일 수 있다고 말한다.", "summary_en": "As architects move from freehand sketching to CAD, they may become fixed on designs too early, explore less freely, and produce work that is formally complex but emotionally weaker.", "summary_ko": "건축가들이 손그림에서 CAD로 옮겨 가면서 설계안을 너무 이르게 굳히고, 자유롭게 탐색하는 과정이 줄어들며, 형식은 복잡해도 감정이 약한 작품을 만들 수 있다는 내용이다.", "structure": [{"label": "도입", "english": "In 2012, the Yale School of Architecture held a symposium called “Is Drawing Dead?”", "korean": "2012년에 예일대 건축대학은 “드로잉은 죽었는가?”라는 이름의 심포지엄을 열었다."}, {"label": "문제", "english": "The bold title reflects a growing sense that the architect’s freehand sketch is being displaced by the computer. The transition from sketchpad to screen entails, many architects believe, a loss of creativity, of adventurousness.", "korean": "그 대담한 제목은 건축가의 손그림 스케치가 컴퓨터에 밀려나고 있다는 점점 커지는 인식을 보여 준다. 많은 건축가들이 믿듯이, 스케치북에서 화면으로의 변화는 창의성과 과감함의 상실을 가져온다."}, {"label": "근거", "english": "Thanks to the precision and apparent completeness of screen renderings, a designer working at a computer has a tendency to lock in, visually and cognitively, on a design at an early stage. He bypasses much of the reflective and exploratory playfulness that springs from the uncertainty and ambiguity of sketching.", "korean": "화면 렌더링의 정확성과 겉으로 보이는 완성도 때문에, 컴퓨터로 작업하는 디자이너는 이른 단계에서 하나의 설계안에 시각적으로도 생각으로도 고정되는 경향이 있다. 그는 스케치의 불확실함과 애매함에서 나오는, 되돌아보고 탐색하는 많은 놀이 같은 과정을 건너뛴다."}, {"label": "부연", "english": "Researchers term this phenomenon “premature fixation” and trace its cause to “the disincentive for design changes once a large amount of detail and interconnectedness is built too quickly into a CAD (Computer-Aided Design) model.”", "korean": "연구자들은 이 현상을 “이른 고착”이라고 부르며, 그 원인을 “많은 세부 요소와 서로 얽힌 관계가 CAD(컴퓨터 지원 설계) 모델 안에 너무 빨리 들어가고 나면 설계를 바꾸려는 마음이 줄어드는 것”에서 찾는다."}, {"label": "결론", "english": "The designer at the computer also tends to emphasize formal experimentation at the expense of expressiveness. By weakening an architect’s “personal, emotional connection with the work,” a renowned American architect and designer Michael Graves argues, CAD software produces designs that, “while complex and interesting in their own way,” often “lack the emotional content of a design derived from hand.”", "korean": "컴퓨터 앞의 디자이너는 표현력을 희생하면서 형식 실험을 더 강조하는 경향도 있다. 미국의 유명한 건축가이자 디자이너인 마이클 그레이브스는 CAD 소프트웨어가 건축가의 “작업과의 개인적이고 감정적인 연결”을 약하게 만들어, “그 나름대로 복잡하고 흥미롭기는 하지만” 종종 “손에서 나온 설계가 지닌 감정적 내용”이 부족한 설계를 만들어 낸다고 말한다."}], "key_vocabulary": [{"word": "symposium", "meaning": "심포지엄, 학술 토론회", "synonyms": ["conference", "forum"], "antonyms": [], "emphasized": true}, {"word": "reflect", "meaning": "보여 주다, 반영하다", "synonyms": ["show", "indicate", "mirror"], "antonyms": ["hide", "ignore"], "emphasized": true}, {"word": "displace", "meaning": "밀어내다, 대신하다", "synonyms": ["replace", "supplant"], "antonyms": ["keep", "retain"], "emphasized": true}, {"word": "transition", "meaning": "변화, 이동", "synonyms": ["change", "shift"], "antonyms": ["stability"], "emphasized": true}, {"word": "entail", "meaning": "수반하다, 가져오다", "synonyms": ["involve", "bring"], "antonyms": ["avoid", "exclude"], "emphasized": true}, {"word": "precision", "meaning": "정확함", "synonyms": ["accuracy", "exactness"], "antonyms": ["inaccuracy", "vagueness"], "emphasized": true}, {"word": "rendering", "meaning": "렌더링, 표현 그림", "synonyms": ["depiction", "representation"], "antonyms": [], "emphasized": false}, {"word": "tendency", "meaning": "경향", "synonyms": ["inclination", "trend"], "antonyms": ["resistance"], "emphasized": true}, {"word": "bypass", "meaning": "건너뛰다, 피하다", "synonyms": ["skip", "avoid"], "antonyms": ["engage", "confront"], "emphasized": true}, {"word": "ambigu function esc(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

  html += `<div class="legend-box">

    <span class="legend-item"><span class="phrase-boxed">박스</span> 관계대명사</span>

// ── Extract plain text from phrase tree ──
function extractText(phrases) {
  if (!phrases) return '';
  let result = '';
  for (const p of phrases) {
    if (p.children && p.children.length > 0) {
      result += extractText(p.children);
    } else if (p.type === 'slash') {
      // skip slash separators in plain text view
    } else {
      result += p.text;
      if (p.text && !p.text.endsWith(' ')) result += ' ';
    }
  }
  return result;
}

// ── Render phrase tree to HTML ──
// openBr/closeBr: bracket HTML strings propagated down to first/last leaf
function renderPhrase(p, depth, openBr, closeBr) {
  depth = depth || 0;
  openBr = openBr || '';
  closeBr = closeBr || '';

  // Slash
  if (p.type === 'slash') {
    return openBr + '<span class="phrase-slash">/</span>' + closeBr;
  }

  // Bracket with children — propagate bracket HTML to first/last child
  if (p.type === 'bracket' && p.children && p.children.length > 0) {
    const dc = 'depth-' + Math.min(depth, 3);
    const myOpen = '<span class="phrase-bracket ' + dc + '">(</span>';
    const myClose = '<span class="phrase-bracket close-paren ' + dc + '">)</span>';
    let result = '';
    const len = p.children.length;
    for (let i = 0; i < len; i++) {
      const co = (i === 0) ? openBr + myOpen : '';
      const cc = (i === len - 1) ? myClose + closeBr : '';
      result += renderPhrase(p.children[i], depth + 1, co, cc);
    }
    return result;
  }

  // Node with children (non-bracket)
  if (p.children && p.children.length > 0) {
    let result = '';
    const len = p.children.length;
    for (let i = 0; i < len; i++) {
      const co = (i === 0) ? openBr : '';
      const cc = (i === len - 1) ? closeBr : '';
      result += renderPhrase(p.children[i], depth, co, cc);
    }
    return result;
  }

  // Leaf node
  let aboveHtml = '';
  if (p.annotation_above) {
    aboveHtml = '<span class="annot-above">' + esc(p.annotation_above) + '</span>';
  }

  let textHtml = esc(p.text);
  if (p.type === 'bold') textHtml = '<strong class="phrase-bold">' + textHtml + '</strong>';
  else if (p.type === 'underline') textHtml = '<span class="phrase-underline">' + textHtml + '</span>';
  else if (p.type === 'boxed') textHtml = '<span class="phrase-boxed">' + textHtml + '</span>';

  let labelHtml = '';
  if (p.label) {
    labelHtml = '<span class="grammar-label">' + esc(p.label) + '</span>';
  }

  let belowHtml = '';
  if (p.annotation_below) {
    belowHtml = '<span class="annot-below">' + esc(p.annotation_below) + '</span>';
  }

  // Brackets outside phrase-core so they don't affect annotation centering
  return '<span class="phrase-unit">' + openBr + '<span class="phrase-core">' + aboveHtml + '<span class="phrase-text">' + textHtml + '</span>' + labelHtml + belowHtml + '</span>' + closeBr + '</span> ';
}

function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast-msg';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.classList.add('show'), 10);
  setTimeout(() => {
    t.classList.remove('show');
    setTimeout(() => t.remove(), 300);
  }, 2500);
}
