<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>문장별 해설 뷰어</title>
<style>
  :root {
    --bg: #f8f7f4;
    --card: #ffffff;
    --accent: #2563eb;
    --accent-light: #dbeafe;
    --highlight: #fef08a;
    --highlight-border: #eab308;
    --text: #1e293b;
    --text-sub: #64748b;
    --border: #e2e8f0;
    --vocab-bg: #f1f5f9;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                 "Noto Sans KR", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    position: relative;
    text-align: center;
    padding: 1.5rem 1rem 1rem;
    border-bottom: 1px solid var(--border);
    background: var(--card);
  }
  .home-btn {
    position: absolute;
    left: 1rem;
    top: 50%;
    transform: translateY(-50%);
    display: inline-flex;
    align-items: center;
    gap: 0.3rem;
    padding: 0.4rem 0.8rem;
    background: var(--accent-light);
    color: var(--accent);
    text-decoration: none;
    border-radius: 8px;
    font-size: 0.85rem;
    font-weight: 600;
    transition: background 0.15s, color 0.15s;
  }
  .home-btn:hover {
    background: var(--accent);
    color: #fff;
  }
  header h1 {
    font-size: 1.1rem;
    font-weight: 700;
    word-break: keep-all;
  }
  .progress-row {
    margin-top: .6rem;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: .5rem;
    font-size: .85rem;
    color: var(--text-sub);
  }
  .progress-bar {
    width: 120px; height: 5px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 3px;
    transition: width .3s;
  }

  /* ── Main ── */
  main {
    flex: 1;
    overflow-y: auto;
    padding: 1.25rem 1rem 7rem;
    max-width: 640px;
    width: 100%;
    margin: 0 auto;
  }

  .section-label {
    font-size: .75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .05em;
    color: var(--accent);
    margin-bottom: .5rem;
  }

  /* Original sentence */
  .original-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem;
    font-size: 1.08rem;
    line-height: 1.75;
    margin-bottom: 1.25rem;
    word-break: keep-all;
  }
  .original-card .hw {
    background: var(--highlight);
    border-bottom: 2px solid var(--highlight-border);
    border-radius: 3px;
    padding: 0 1px;
    cursor: pointer;
    transition: background .15s;
  }
  .original-card .hw:hover {
    background: #fde047;
  }

  /* ── Tooltip ── */
  .tooltip-overlay {
    position: fixed;
    inset: 0;
    z-index: 99;
  }
  .vocab-tooltip {
    position: absolute;
    z-index: 100;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: .9rem 1rem;
    box-shadow: 0 4px 20px rgba(0,0,0,.12);
    max-width: 320px;
    width: max-content;
    animation: tooltipIn .15s ease;
  }
  .vocab-tooltip::after {
    content: '';
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    border: 8px solid transparent;
  }
  .vocab-tooltip.above::after {
    top: 100%;
    border-top-color: var(--card);
  }
  .vocab-tooltip.below::after {
    bottom: 100%;
    border-bottom-color: var(--card);
  }
  .vocab-tooltip .tt-word {
    font-weight: 700;
    color: var(--accent);
    font-size: .95rem;
    margin-bottom: .2rem;
  }
  .vocab-tooltip .tt-meaning {
    font-size: .9rem;
    line-height: 1.5;
  }
  .vocab-tooltip .tt-note {
    font-size: .8rem;
    color: var(--text-sub);
    margin-top: .15rem;
    line-height: 1.4;
  }
  .vocab-tooltip .tt-sep {
    border: none;
    border-top: 1px solid var(--border);
    margin: .5rem 0;
  }
  @keyframes tooltipIn {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Explanation */
  .explain-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem;
    font-size: .97rem;
    line-height: 1.8;
    margin-bottom: 1.25rem;
    color: var(--text);
  }

  /* Vocabulary */
  .vocab-list {
    display: flex;
    flex-direction: column;
    gap: .6rem;
  }
  .vocab-item {
    background: var(--vocab-bg);
    border-radius: 10px;
    padding: 1rem 1.1rem;
  }
  .vocab-word {
    font-weight: 700;
    font-size: 1rem;
    color: var(--accent);
  }
  .vocab-meaning {
    margin-top: .25rem;
    font-size: .93rem;
  }
  .vocab-note {
    margin-top: .2rem;
    font-size: .82rem;
    color: var(--text-sub);
  }

  /* ── Bottom Nav ── */
  .bottom-nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--card);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: .75rem 1rem;
    padding-bottom: max(.75rem, env(safe-area-inset-bottom));
    z-index: 10;
  }
  .nav-btn {
    display: flex;
    align-items: center;
    gap: .35rem;
    background: none;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: .6rem 1.1rem;
    font-size: .95rem;
    font-weight: 600;
    color: var(--text);
    cursor: pointer;
    transition: all .15s;
    min-width: 5.5rem;
    justify-content: center;
  }
  .nav-btn:active { transform: scale(.96); }
  .nav-btn:not(:disabled):hover {
    border-color: var(--accent);
    color: var(--accent);
  }
  .nav-btn:disabled { opacity: .3; cursor: default; }
  .nav-indicator {
    font-size: .85rem;
    font-weight: 600;
    color: var(--text-sub);
    min-width: 3rem;
    text-align: center;
  }

  /* Animation */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  main > * { animation: fadeIn .3s ease; }
</style>
</head>
<body>

<header>
  <a class="home-btn" href="../../">&#8592; 홈</a>
  <h1 id="pageTitle">문장별 해설</h1>
  <div class="progress-row">
    <span id="progressLabel">1 / ?</span>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  </div>
</header>

<main id="content"></main>

<nav class="bottom-nav">
  <button class="nav-btn" id="prevBtn" onclick="go(-1)">&#8249; 이전</button>
  <span class="nav-indicator" id="navIndicator">1 / ?</span>
  <button class="nav-btn" id="nextBtn" onclick="go(1)">다음 &#8250;</button>
</nav>

<script>
// ── DATA (injected by generate_html) ──
const DATA = {"title": "문학과 언어 학습의 몰입 효과", "summary": "문학은 학습자를 이야기와 인물에 정서적으로 몰입하게 만들어, 언어의 기계적 측면을 넘어 더 깊고 의미 있는 언어 학습을 가능하게 한다.", "sentences": [{"id": 1, "original": "Literature can be helpful in the language learning process because of the personal involvement it fosters in readers.", "explanation": "문학은 독자가 작품에 개인적으로 깊이 관여하도록 이끌기 때문에 언어 학습 과정에서 도움이 될 수 있다는 뜻이다.", "vocabulary": [{"word": "literature", "meaning": "문학", "note": "소설, 시, 희곡 등 문학 작품 전반을 가리킨다."}, {"word": "personal involvement", "meaning": "개인적 몰입, 개인적인 관여", "note": "학습자가 감정적·심리적으로 참여하는 상태를 뜻한다."}, {"word": "foster", "meaning": "촉진하다, 북돋우다", "note": "좋은 성질이나 발달을 길러 준다는 의미로 자주 쓰인다."}]}, {"id": 2, "original": "Core language teaching materials must concentrate on how a language operates both as a rule‑based system and as a sociosemantic system.", "explanation": "핵심적인 언어 교육 자료는 언어가 규칙에 따라 작동하는 체계이면서 동시에 사회적 의미를 담아내는 체계라는 두 측면에 모두 초점을 맞춰야 한다는 말이다.", "vocabulary": [{"word": "core", "meaning": "핵심의", "note": "가장 기본적이고 중심이 되는 것을 뜻한다."}, {"word": "concentrate on", "meaning": "~에 집중하다", "note": "focus on과 비슷한 표현이다."}, {"word": "operate", "meaning": "작동하다, 기능하다", "note": "여기서는 언어가 어떤 방식으로 기능하는지를 말한다."}, {"word": "rule-based system", "meaning": "규칙 기반 체계", "note": "문법 규칙처럼 일정한 원리에 따라 이루어진 체계를 뜻한다."}, {"word": "sociosemantic system", "meaning": "사회·의미적 체계", "note": "사회적 맥락과 의미 작용을 함께 보는 개념이다."}]}, {"id": 3, "original": "Very often, the process of learning is essentially analytic, piecemeal, and, at the level of the personality, fairly superficial.", "explanation": "학습 과정은 흔히 분석적이고 단편적이며, 학습자의 인격이나 내면의 차원에서는 상당히 피상적으로 이루어진다는 의미이다.", "vocabulary": [{"word": "essentially", "meaning": "본질적으로", "note": "겉모습이 아니라 핵심 성격을 설명할 때 쓴다."}, {"word": "analytic", "meaning": "분석적인", "note": "전체보다 요소를 나누어 이해하는 접근을 말한다."}, {"word": "piecemeal", "meaning": "단편적인, 조각조각의", "note": "전체적 연결 없이 부분별로 이루어짐을 뜻한다."}, {"word": "at the level of the personality", "meaning": "인격적 차원에서", "note": "학습자의 내면적·개인적 측면을 가리킨다."}, {"word": "superficial", "meaning": "피상적인", "note": "깊이가 없고 표면적인 상태를 뜻한다."}]}, {"id": 4, "original": "Engaging imaginatively with literature enables learners to shift the focus of their attention beyond the more mechanical aspects of the foreign language system.", "explanation": "문학을 상상력을 발휘하며 접하면 학습자는 외국어 체계의 기계적이고 형식적인 측면을 넘어 더 넓은 곳으로 관심을 옮길 수 있게 된다.", "vocabulary": [{"word": "engage with", "meaning": "~에 적극적으로 몰입하다, 관여하다", "note": "단순히 읽는 것이 아니라 적극적으로 접하고 반응하는 느낌이 있다."}, {"word": "imaginatively", "meaning": "상상력을 발휘하여", "note": "창의적이고 생생하게 받아들이는 태도를 나타낸다."}, {"word": "enable", "meaning": "~할 수 있게 하다", "note": "allow보다 다소 공식적인 표현이다."}, {"word": "shift the focus of their attention", "meaning": "주의의 초점을 옮기다", "note": "무엇에 집중하는지를 바꾸는 것을 뜻한다."}, {"word": "mechanical aspects", "meaning": "기계적인 측면", "note": "의미나 감정보다 형식·규칙 중심의 측면을 가리킨다."}]}, {"id": 5, "original": "When a novel, play or short story is explored over a period of time, the result is that the reader begins to ‘inhabit’ the text.", "explanation": "소설, 희곡, 단편소설을 일정 기간에 걸쳐 깊이 있게 읽고 탐구하면, 독자는 점차 그 텍스트 속에 들어가 사는 듯한 상태가 된다는 뜻이다.", "vocabulary": [{"word": "explore", "meaning": "탐구하다, 깊이 살펴보다", "note": "여기서는 작품을 자세히 읽고 이해해 가는 과정을 말한다."}, {"word": "over a period of time", "meaning": "일정 기간에 걸쳐", "note": "한 번에가 아니라 시간이 흐르면서라는 의미이다."}, {"word": "the result is that", "meaning": "그 결과 ~하게 된다", "note": "앞의 과정이 뒤의 결과로 이어짐을 나타낸다."}, {"word": "inhabit", "meaning": "살다, 거주하다; 몰입해 들어가다", "note": "여기서는 비유적으로 텍스트 속 세계를 실제처럼 살아간다는 뜻이다."}]}, {"id": 6, "original": "He or she is drawn into the book.", "explanation": "독자는 책의 세계 속으로 자연스럽게 끌려 들어가게 된다.", "vocabulary": [{"word": "be drawn into", "meaning": "~에 이끌려 들어가다", "note": "수동형으로, 스스로라기보다 어떤 힘에 의해 빠져드는 느낌을 준다."}, {"word": "the book", "meaning": "책, 작품 세계", "note": "여기서는 물리적인 책보다 이야기의 세계를 가리킨다."}]}, {"id": 7, "original": "Pinpointing what individual words or phrases may mean becomes less important than pursuing the development of the story.", "explanation": "개별 단어나 구절의 정확한 의미를 하나하나 짚어내는 일보다 이야기의 전개를 따라가는 일이 더 중요해진다는 말이다.", "vocabulary": [{"word": "pinpoint", "meaning": "정확히 짚어내다", "note": "위치나 의미를 아주 정확하게 특정한다는 뜻이다."}, {"word": "individual words or phrases", "meaning": "개별 단어 또는 구절", "note": "문장 전체가 아니라 각각의 언어 단위를 가리킨다."}, {"word": "pursue", "meaning": "추적하다, 따라가다", "note": "여기서는 이야기 전개를 계속 좇는다는 의미이다."}, {"word": "development of the story", "meaning": "이야기의 전개", "note": "줄거리의 진행과 변화 과정을 뜻한다."}]}, {"id": 8, "original": "The reader is eager to find out what happens as events unfold; he or she feels close to certain characters and shares their emotional responses.", "explanation": "사건이 전개되면서 무슨 일이 일어나는지 독자는 몹시 알고 싶어 하고, 어떤 인물들에게 친밀감을 느끼며 그들의 감정적 반응까지 함께 나누게 된다.", "vocabulary": [{"word": "be eager to", "meaning": "몹시 ~하고 싶어 하다", "note": "강한 기대나 열의를 나타낸다."}, {"word": "find out", "meaning": "알아내다", "note": "무슨 일이 일어나는지 확인하고 알게 되는 것을 뜻한다."}, {"word": "unfold", "meaning": "전개되다", "note": "사건이나 이야기가 점차 드러나며 진행되는 것을 말한다."}, {"word": "feel close to", "meaning": "~에게 친밀감을 느끼다", "note": "정서적으로 가깝게 느끼는 상태이다."}, {"word": "emotional responses", "meaning": "감정적 반응", "note": "인물이 상황에 대해 보이는 감정 표현이나 반응을 뜻한다."}]}, {"id": 9, "original": "The language becomes ‘transparent’ — the fiction draws the whole person into its own world.", "explanation": "언어 자체는 더 이상 눈에 띄지 않을 정도로 투명해지고, 대신 허구의 이야기가 독자라는 한 인간 전체를 자기 세계 속으로 끌어들이게 된다는 의미이다.", "vocabulary": [{"word": "transparent", "meaning": "투명한; 의식되지 않을 정도로 매개가 되는", "note": "여기서는 언어 형식이 앞에 드러나지 않고 내용 전달의 통로가 된다는 비유적 의미이다."}, {"word": "fiction", "meaning": "허구, 소설적 이야기", "note": "사실이 아닌 상상으로 구성된 이야기 전반을 뜻한다."}, {"word": "the whole person", "meaning": "인간 전체, 전인적 존재", "note": "지성뿐 아니라 감정과 상상력까지 포함한 전체적 자아를 말한다."}, {"word": "draw A into B", "meaning": "A를 B로 끌어들이다", "note": "몰입하게 하거나 빠져들게 한다는 뜻의 표현이다."}]}]};

// ── Levenshtein distance ──
function lev(a, b) {
  const m = a.length, n = b.length;
  const dp = Array.from({ length: m + 1 }, () => Array(n + 1).fill(0));
  for (let i = 0; i <= m; i++) dp[i][0] = i;
  for (let j = 0; j <= n; j++) dp[0][j] = j;
  for (let i = 1; i <= m; i++)
    for (let j = 1; j <= n; j++)
      dp[i][j] = Math.min(
        dp[i-1][j] + 1,
        dp[i][j-1] + 1,
        dp[i-1][j-1] + (a[i-1] !== b[j-1] ? 1 : 0)
      );
  return dp[m][n];
}

// ── Tokenizer ──
function tokenize(text) {
  const re = /[A-Za-z\u2019']+(?:-[A-Za-z\u2019']+)*/g;
  const tokens = []; let m;
  while ((m = re.exec(text)) !== null)
    tokens.push({ text: m[0], start: m.index, end: m.index + m[0].length });
  return tokens;
}

function findConsecutive(text, phraseWords) {
  const tokens = tokenize(text);
  for (let i = 0; i <= tokens.length - phraseWords.length; i++) {
    let ok = true;
    for (let j = 0; j < phraseWords.length; j++)
      if (tokens[i+j].text.toLowerCase() !== phraseWords[j]) { ok = false; break; }
    if (ok) return { start: tokens[i].start, end: tokens[i + phraseWords.length - 1].end };
  }
  return null;
}

// ── Highlight logic ──
function highlightSentence(text, vocabList) {
  const ranges = [];
  const lower = text.toLowerCase();

  for (let vi = 0; vi < vocabList.length; vi++) {
    const v = vocabList[vi];
    const phrase = v.word.toLowerCase().replace(/\s*\(.*?\)\s*/g, '').trim();

    // 1) Exact substring
    const idx = lower.indexOf(phrase);
    if (idx !== -1) { ranges.push({ start: idx, end: idx + phrase.length, vi }); continue; }

    // 2) Multi-word consecutive
    const pw = phrase.split(/\s+/);
    if (pw.length > 1) {
      const found = findConsecutive(text, pw);
      if (found) { ranges.push({ ...found, vi }); continue; }
    }

    // 3) Fuzzy per token
    const tokens = tokenize(text);
    for (const w of pw) {
      let bestD = Infinity, bestT = null;
      const thresh = Math.max(2, Math.floor(w.length * 0.35));
      for (const t of tokens) {
        const d = lev(w, t.text.toLowerCase());
        if (d < bestD) { bestD = d; bestT = t; }
      }
      if (bestT && bestD <= thresh) ranges.push({ start: bestT.start, end: bestT.end, vi });
    }
  }

  // Merge overlapping (collect vocab indices)
  ranges.sort((a, b) => a.start - b.start);
  const merged = [];
  for (const r of ranges) {
    if (merged.length && r.start <= merged[merged.length-1].end) {
      merged[merged.length-1].end = Math.max(merged[merged.length-1].end, r.end);
      merged[merged.length-1].vis.add(r.vi);
    } else {
      merged.push({ start: r.start, end: r.end, vis: new Set([r.vi]) });
    }
  }

  let result = '', last = 0;
  for (const r of merged) {
    result += esc(text.slice(last, r.start));
    const idxs = [...r.vis].join(',');
    result += '<span class="hw" data-vocab="' + idxs + '">' + esc(text.slice(r.start, r.end)) + '</span>';
    last = r.end;
  }
  return result + esc(text.slice(last));
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Render ──
let cur = 0;
const total = DATA.sentences ? DATA.sentences.length : 0;

function render() {
  if (!total) { document.getElementById('content').innerHTML = '<p>데이터가 없습니다.</p>'; return; }
  const s = DATA.sentences[cur];
  const vocabHtml = s.vocabulary.map(v => `
    <div class="vocab-item">
      <div class="vocab-word">${esc(v.word)}</div>
      <div class="vocab-meaning">${esc(v.meaning)}</div>
      ${v.note ? `<div class="vocab-note">${esc(v.note)}</div>` : ''}
    </div>`).join('');

  document.getElementById('content').innerHTML = `
    <div class="section-label">원문</div>
    <div class="original-card">${highlightSentence(s.original, s.vocabulary)}</div>
    <div class="section-label">해설</div>
    <div class="explain-card">${esc(s.explanation)}</div>
    <div class="section-label">주요 단어</div>
    <div class="vocab-list">${vocabHtml}</div>`;

  const label = `${cur+1} / ${total}`;
  document.getElementById('progressLabel').textContent = label;
  document.getElementById('navIndicator').textContent = label;
  document.getElementById('progressFill').style.width = `${((cur+1)/total)*100}%`;
  document.getElementById('prevBtn').disabled = cur === 0;
  document.getElementById('nextBtn').disabled = cur === total - 1;
  document.getElementById('content').scrollTop = 0;
}

function go(dir) {
  const next = cur + dir;
  if (next < 0 || next >= total) return;
  cur = next; render();
}

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft') go(-1);
  if (e.key === 'ArrowRight') go(1);
});
// Swipe
let sx = 0;
document.addEventListener('touchstart', e => { sx = e.touches[0].clientX; });
document.addEventListener('touchend', e => {
  const d = e.changedTouches[0].clientX - sx;
  if (Math.abs(d) > 60) go(d < 0 ? 1 : -1);
});

// ── Tooltip ──
function hideTooltip() {
  document.querySelectorAll('.vocab-tooltip, .tooltip-overlay').forEach(el => el.remove());
}

function showTooltip(hwEl) {
  hideTooltip();
  const s = DATA.sentences[cur];
  const idxs = hwEl.dataset.vocab.split(',').map(Number);
  const vocabs = idxs.map(i => s.vocabulary[i]).filter(Boolean);
  if (!vocabs.length) return;

  // Build tooltip content
  const inner = vocabs.map((v, i) =>
    (i > 0 ? '<hr class="tt-sep">' : '') +
    '<div class="tt-word">' + esc(v.word) + '</div>' +
    '<div class="tt-meaning">' + esc(v.meaning) + '</div>' +
    (v.note ? '<div class="tt-note">' + esc(v.note) + '</div>' : '')
  ).join('');

  // Overlay to catch outside clicks
  const overlay = document.createElement('div');
  overlay.className = 'tooltip-overlay';
  overlay.addEventListener('click', hideTooltip);
  document.body.appendChild(overlay);

  // Tooltip element
  const tip = document.createElement('div');
  tip.className = 'vocab-tooltip';
  tip.innerHTML = inner;
  document.body.appendChild(tip);

  // Position
  const rect = hwEl.getBoundingClientRect();
  const tipH = tip.offsetHeight;
  const tipW = tip.offsetWidth;
  const spaceAbove = rect.top;
  const showAbove = spaceAbove > tipH + 16;

  let top, leftPos;
  if (showAbove) {
    top = rect.top + window.scrollY - tipH - 10;
    tip.classList.add('above');
  } else {
    top = rect.bottom + window.scrollY + 10;
    tip.classList.add('below');
  }
  leftPos = rect.left + window.scrollX + rect.width / 2 - tipW / 2;
  leftPos = Math.max(8, Math.min(leftPos, window.innerWidth - tipW - 8));

  tip.style.top = top + 'px';
  tip.style.left = leftPos + 'px';
}

document.addEventListener('click', e => {
  const hw = e.target.closest('.hw');
  if (hw && hw.dataset.vocab) { e.stopPropagation(); showTooltip(hw); }
});

// Init
if (DATA.title) document.getElementById('pageTitle').textContent = DATA.title;
render();
</script>
